# Vrata Controller configuration.
# All string values support ${ENV_VAR} substitution.

# Connection to the Vrata control plane REST API.
controlPlaneUrl: "${CONTROLPLANE_URL:-http://localhost:8080}"

# TLS for the connection to the control plane (optional).
# When absent, plain HTTP or system CA defaults are used.
#
# tls:
#   # PEM-encoded client certificate and key for mTLS (optional).
#   cert: "${CONTROLLER_TLS_CERT}"
#   key: "${CONTROLLER_TLS_KEY}"
#   # PEM-encoded CA bundle to verify the control plane server cert.
#   ca: "${CP_CA}"

# API key sent to the control plane on every request (optional).
# apiKey: "${CONTROLLER_API_KEY}"

# Which Kubernetes resources to watch.
watch:
  # Restrict to specific namespaces. Empty list = all namespaces.
  # namespaces:
  #   - production
  #   - staging
  namespaces: []

  # Watch standard Gateway API HTTPRoute resources.
  httpRoutes: true

  # Watch standard Gateway API GRPCRoute resources.
  grpcRoutes: true

  # Watch SuperHTTPRoute resources (HTTPRoute without maxItems limits).
  # Requires the SuperHTTPRoute CRD to be installed.
  superHttpRoutes: false

  # Watch Gateway resources to sync Listeners.
  gateways: true

  # Only reconcile Gateways with this gatewayClassName.
  # The controller claims GatewayClasses matching its controllerName
  # (vrata.io/controller) regardless of this setting.
  gatewayClassName: "${GATEWAY_CLASS_NAME:-vrata}"

# Snapshot batching — changes are accumulated and a snapshot is created
# when the debounce timer expires or the max batch size is reached.
snapshot:
  # How long to wait after the last change before creating a snapshot.
  debounce: "${SNAPSHOT_DEBOUNCE:-5s}"
  # Force a snapshot after this many changes even if more keep arriving.
  maxBatch: 100

  # Batch deployment support (vrata.io/batch annotation).
  #
  # When HTTPRoutes carry the vrata.io/batch annotation, the controller groups
  # them and waits for all members before creating a single atomic snapshot.
  # batchIdleTimeout controls how long to wait after the last member arrives
  # before considering the group complete. The timer resets on every new member.
  batchIdleTimeout: "${BATCH_IDLE_TIMEOUT:-10s}"

  # What to do when a batch with vrata.io/batch-size times out before all
  # members arrive. This only applies when BOTH annotations are present —
  # without batch-size the controller can't detect incomplete batches.
  #
  # "apply"  — log an error and create the snapshot with the members that
  #            arrived. The proxy gets partially-applied config. Use this when
  #            routes are independent and partial service is better than none.
  #
  # "reject" — log an error and discard the batch entirely. No snapshot is
  #            created — the previous active snapshot stays in effect. Use this
  #            when routes depend on each other and partial config would cause
  #            errors. The operator must re-deploy to converge.
  batchIncompletePolicy: "${BATCH_INCOMPLETE_POLICY:-apply}"

# Duplicate/overlapping route detection.
duplicates:
  # "off"    — disabled
  # "warn"   — log overlaps but sync anyway
  # "reject" — log overlaps and skip the HTTPRoute (sets Accepted: False)
  mode: "${DUPLICATES_MODE:-warn}"

# Logging.
log:
  # "console" (human-readable) or "json".
  format: "${LOG_FORMAT:-console}"
  # "debug", "info", "warn", or "error".
  level: "${LOG_LEVEL:-info}"

# Leader election for running multiple replicas.
# When enabled, only the leader reconciles. Others wait.
leaderElection:
  enabled: false
  # Name of the Lease resource.
  leaseName: "${LEADER_LEASE_NAME:-vrata-controller-leader}"
  # Namespace where the Lease is created.
  leaseNamespace: "${LEADER_LEASE_NAMESPACE:-default}"
  # How long the leader holds the lease.
  leaseDuration: "15s"
  # How long the leader waits before renewing.
  renewDeadline: "10s"
  # How often non-leaders retry acquiring the lease.
  retryPeriod: "2s"

# Prometheus metrics.
metrics:
  enabled: false
  # Address the metrics server listens on.
  address: "${METRICS_ADDRESS:-:9090}"
