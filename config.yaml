# mode: "controlplane" (default) or "proxy"
# - controlplane: REST API + store + gateway + proxy + SSE sync endpoint
# - proxy: connects to a control plane via SSE, no local store or API
mode: "${VRATA_MODE:-controlplane}"

server:
  # Address the REST API HTTP server listens on (controlplane mode only).
  address: "${SERVER_ADDRESS:-:8080}"

# Settings for proxy mode — ignored in controlplane mode.
controlPlane:
  # Base URL of the control plane (e.g. "http://10.0.0.1:8080").
  address: "${CONTROLPLANE_ADDRESS:-}"
  # How long to wait before reconnecting after a stream disconnection.
  reconnectInterval: "${CONTROLPLANE_RECONNECT_INTERVAL:-5s}"

log:
  # format: "console" (human-readable) or "json"
  format: "${LOG_FORMAT:-console}"
  # level: "debug", "info", "warn", or "error"
  level: "${LOG_LEVEL:-info}"

# Raft cluster for HA control plane (optional).
# When absent, the control plane runs in single-node mode.
# cluster:
#   # Unique node ID within the cluster.
#   nodeId: "${RAFT_NODE_ID}"
#   # Address for Raft peer-to-peer communication.
#   bindAddress: "${RAFT_BIND_ADDRESS:-:7000}"
#   # Address other nodes use to reach this node.
#   # In Kubernetes, set to the pod IP via downward API: "${POD_IP}:7000"
#   advertiseAddress: "${RAFT_ADVERTISE_ADDRESS}"
#   # Directory for Raft logs and snapshots.
#   dataDir: "${RAFT_DATA_DIR:-/data/raft}"
#   # Static peer list. Format: "nodeId=host:port"
#   # peers:
#   #   - "cp-0=10.0.0.1:7000"
#   #   - "cp-1=10.0.0.2:7000"
#   #   - "cp-2=10.0.0.3:7000"
#   # Or use DNS discovery (Kubernetes headless Service):
#   discovery:
#     dns: "${RAFT_DISCOVERY_DNS}"

# Session store for STICKY destination balancing.
# Credentials via environment variables.
sessionStore:
  type: "${SESSION_STORE_TYPE}"
  redis:
    address: "${REDIS_ADDRESS}"
    password: "${REDIS_PASSWORD}"
    db: 0
