<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#6b7280"/>
    </marker>
    <marker id="b" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#13678a"/>
    </marker>
    <marker id="c" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#45b7d1"/>
    </marker>
  </defs>

  <rect width="720" height="300" rx="12" fill="#f8fafb"/>

  <!-- Left: who configures -->
  <text x="70" y="30" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="0.5">WHO</text>

  <rect x="15" y="50" width="110" height="42" rx="8" fill="#0b2545"/>
  <text x="70" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Operator</text>

  <rect x="15" y="110" width="110" height="42" rx="8" fill="#0b2545"/>
  <text x="70" y="136" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">CI / CD</text>

  <rect x="15" y="170" width="110" height="42" rx="8" fill="#0b2545"/>
  <text x="70" y="196" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">K8s Controller</text>

  <rect x="15" y="230" width="110" height="42" rx="8" fill="#0b2545"/>
  <text x="70" y="256" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Users</text>

  <!-- Center: Vrata -->
  <text x="340" y="30" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="0.5">VRATA</text>

  <!-- Control Plane box -->
  <rect x="210" y="50" width="260" height="100" rx="10" fill="#13678a"/>
  <text x="340" y="78" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Control Plane</text>
  <text x="340" y="100" text-anchor="middle" fill="#bee9e8" font-size="12">REST API · bbolt · Raft</text>
  <text x="340" y="120" text-anchor="middle" fill="#bee9e8" font-size="11" font-style="italic">Stores config, pushes snapshots</text>

  <!-- Proxy box -->
  <rect x="210" y="190" width="260" height="80" rx="10" fill="#bee9e8" stroke="#45b7d1" stroke-width="2"/>
  <text x="340" y="218" text-anchor="middle" fill="#0b2545" font-size="14" font-weight="700">Proxy</text>
  <text x="340" y="240" text-anchor="middle" fill="#13678a" font-size="12">Listeners · Routing · Middlewares</text>
  <text x="340" y="258" text-anchor="middle" fill="#13678a" font-size="11" font-style="italic">Routes traffic, stateless</text>

  <!-- Right: backends -->
  <text x="610" y="30" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="0.5">YOUR SERVICES</text>

  <rect x="550" y="190" width="120" height="36" rx="8" fill="#e5e7eb"/>
  <text x="610" y="213" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="500">Service A</text>

  <rect x="550" y="234" width="120" height="36" rx="8" fill="#e5e7eb"/>
  <text x="610" y="257" text-anchor="middle" fill="#1a1a2e" font-size="12" font-weight="500">Service B</text>

  <!-- Arrows: Clients → Control Plane -->
  <line x1="125" y1="71" x2="205" y2="82" stroke="#13678a" stroke-width="2" marker-end="url(#b)"/>
  <line x1="125" y1="131" x2="205" y2="105" stroke="#13678a" stroke-width="2" marker-end="url(#b)"/>
  <line x1="125" y1="191" x2="205" y2="130" stroke="#13678a" stroke-width="2" marker-end="url(#b)"/>
  <text x="170" y="68" fill="#13678a" font-size="9" font-weight="500">REST API</text>

  <!-- Arrow: Users → Proxy -->
  <line x1="125" y1="251" x2="205" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
  <text x="163" y="248" fill="#6b7280" font-size="9" font-weight="500">HTTP</text>

  <!-- Arrow: Control Plane → Proxy (SSE) -->
  <line x1="340" y1="155" x2="340" y2="185" stroke="#45b7d1" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#c)"/>
  <text x="385" y="175" fill="#45b7d1" font-size="10" font-weight="600">SSE snapshots</text>

  <!-- Arrows: Proxy → Backends -->
  <line x1="470" y1="215" x2="545" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
  <line x1="470" y1="235" x2="545" y2="250" stroke="#6b7280" stroke-width="2" marker-end="url(#a)"/>
</svg>
