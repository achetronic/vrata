baseURL = "https://achetronic.github.io/vrata/"
languageCode = "en-us"
title = "Vrata"
enableRobotsTXT = true
enableGitInfo = false

[params]
  description = "Programmable reverse proxy with REST API, versioned snapshots, and zero-downtime config updates."
  tagline = "The last gateway you'll configure"
  github = "https://github.com/achetronic/vrata"

[markup]
  [markup.highlight]
    style = "dracula"
    lineNos = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

