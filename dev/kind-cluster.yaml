# Kind cluster config for local Rutoso development.
# Creates a single-node cluster with NodePort mappings so Envoy is
# reachable from the host without port-forward.
#
# Used by: make dev-up
# Deleted by: make dev-down
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
    extraPortMappings:
      # Envoy HTTP listener (pushed by Rutoso via xDS)
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
      # Envoy admin panel
      - containerPort: 30901
        hostPort: 30901
        protocol: TCP
