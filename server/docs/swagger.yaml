basePath: /
definitions:
  model.Backend:
    properties:
      host:
        description: Host is the upstream hostname or IP address.
        type: string
      name:
        description: |-
          Name is a unique identifier for this backend within the route.
          It maps to an Envoy cluster name.
        type: string
      port:
        description: Port is the upstream TCP port.
        type: integer
      tls:
        description: TLS indicates whether the connection to the upstream should use
          TLS.
        type: boolean
      weight:
        description: |-
          Weight controls what percentage of traffic is sent to this backend
          when multiple backends are defined. Values across all backends in a
          route must sum to 100.
        type: integer
    type: object
  model.CORSConfig:
    properties:
      allowCredentials:
        description: AllowCredentials indicates whether the request can include user
          credentials.
        type: boolean
      allowHeaders:
        description: AllowHeaders lists the request headers allowed in CORS requests.
        items:
          type: string
        type: array
      allowMethods:
        description: |-
          AllowMethods lists the HTTP methods allowed in CORS requests.
          Example: ["GET", "POST", "OPTIONS"]
        items:
          type: string
        type: array
      allowOrigins:
        description: |-
          AllowOrigins lists the allowed origin patterns.
          Each entry is matched as an exact string or a regex if Regex is true.
        items:
          $ref: '#/definitions/model.CORSOrigin'
        type: array
      exposeHeaders:
        description: ExposeHeaders lists the response headers the browser is allowed
          to access.
        items:
          type: string
        type: array
      maxAge:
        description: |-
          MaxAge sets the preflight cache duration in seconds.
          Maps to the Access-Control-Max-Age response header.
        type: integer
    type: object
  model.CORSOrigin:
    properties:
      regex:
        description: Regex indicates that Value should be treated as a regular expression.
        type: boolean
      value:
        description: Value is the origin string or regex pattern.
        type: string
    type: object
  model.ExtAuthzConfig:
    properties:
      failureModeAllow:
        description: |-
          FailureModeAllow controls what happens when the authz service is
          unreachable. If true, requests are allowed through (fail-open).
          Default is false (fail-closed).
        type: boolean
      grpcService:
        description: |-
          GRPCService is the address of the gRPC authorisation service
          (e.g. "authz.default.svc.cluster.local:50051").
          Mutually exclusive with HTTPService.
        type: string
      httpService:
        description: |-
          HTTPService is the URL of the HTTP authorisation service
          (e.g. "http://opa.default.svc.cluster.local:8181/v1/authz").
          Mutually exclusive with GRPCService.
        type: string
      includeRequestBodyInCheck:
        description: IncludeRequestBodyInCheck forwards the request body to the authz
          service.
        type: boolean
      timeout:
        description: Timeout is the authorisation request deadline (e.g. "5s", "500ms").
        type: string
    type: object
  model.ExtProcConfig:
    properties:
      grpcService:
        description: |-
          GRPCService is the address of the gRPC processing service
          (e.g. "ext-proc.default.svc.cluster.local:9000").
        type: string
      processingMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcMode'
        description: |-
          ProcessingMode controls which parts of the HTTP transaction are sent to
          the external processor.
      timeout:
        description: Timeout is the processing request deadline (e.g. "2s").
        type: string
    type: object
  model.ExtProcMode:
    properties:
      requestBodyMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: RequestBodyMode controls processing of the request body.
      requestHeaderMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: RequestHeaderMode controls processing of request headers.
      responseBodyMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: ResponseBodyMode controls processing of the response body.
      responseHeaderMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: ResponseHeaderMode controls processing of response headers.
    type: object
  model.ExtProcPhase:
    enum:
    - SKIP
    - SEND
    - BUFFERED
    type: string
    x-enum-varnames:
    - ExtProcPhaseSkip
    - ExtProcPhaseSend
    - ExtProcPhaseBuffered
  model.Filter:
    properties:
      cors:
        allOf:
        - $ref: '#/definitions/model.CORSConfig'
        description: CORS holds the CORS filter configuration. Set when Type == "cors".
      extAuthz:
        allOf:
        - $ref: '#/definitions/model.ExtAuthzConfig'
        description: |-
          ExtAuthz holds the external authorisation filter configuration.
          Set when Type == "extAuthz".
      extProc:
        allOf:
        - $ref: '#/definitions/model.ExtProcConfig'
        description: |-
          ExtProc holds the external processing filter configuration.
          Set when Type == "extProc".
      id:
        description: ID is the unique identifier of the filter.
        type: string
      jwt:
        allOf:
        - $ref: '#/definitions/model.JWTConfig'
        description: JWT holds the JWT authn filter configuration. Set when Type ==
          "jwt".
      name:
        description: Name is a human-readable label for the filter.
        type: string
      type:
        allOf:
        - $ref: '#/definitions/model.FilterType'
        description: |-
          Type identifies which Envoy HTTP filter this entity configures.
          Exactly one of the Config* fields below must match this type.
    type: object
  model.FilterOverride:
    properties:
      disabled:
        description: |-
          Disabled completely disables the filter for this route/group.
          When true, no other field is evaluated.
        type: boolean
      extAuthzContextExtensions:
        additionalProperties:
          type: string
        description: |-
          ExtAuthzContextExtensions adds key/value pairs to the ext_authz check request.
          Only meaningful when the referenced filter is of type "extAuthz".
        type: object
      extProcMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcMode'
        description: |-
          ExtProcMode overrides the processing mode for this route/group.
          Only meaningful when the referenced filter is of type "extProc".
      jwtProvider:
        description: |-
          JWTProvider selects a specific JWT provider by name (instead of requiring all).
          Only meaningful when the referenced filter is of type "jwt".
        type: string
    type: object
  model.FilterType:
    enum:
    - cors
    - jwt
    - extAuthz
    - extProc
    type: string
    x-enum-varnames:
    - FilterTypeCORS
    - FilterTypeJWT
    - FilterTypeExtAuthz
    - FilterTypeExtProc
  model.HeaderMatcher:
    properties:
      name:
        description: Name is the header name (case-insensitive).
        type: string
      regex:
        description: Regex indicates that Value should be treated as a regular expression.
        type: boolean
      value:
        description: |-
          Value is the exact value the header must have.
          If empty, only the presence of the header is checked.
        type: string
    type: object
  model.JWTClaimHeader:
    properties:
      claim:
        description: Claim is the JWT claim name (e.g. "sub", "email").
        type: string
      header:
        description: Header is the request header name that receives the claim value.
        type: string
    type: object
  model.JWTConfig:
    properties:
      providers:
        additionalProperties:
          $ref: '#/definitions/model.JWTProvider'
        description: |-
          Providers is a map of provider name to JWTProvider configuration.
          The map key is referenced from per-route overrides to select a specific
          provider (or disable authentication for that route).
        type: object
      rules:
        description: |-
          Rules defines which request paths require JWT validation and which
          provider to apply. If empty, all paths are validated by all providers.
        items:
          $ref: '#/definitions/model.JWTRule'
        type: array
    type: object
  model.JWTProvider:
    properties:
      audiences:
        description: |-
          Audiences lists the expected "aud" claim values. If empty, audience
          validation is skipped.
        items:
          type: string
        type: array
      claimToHeaders:
        description: |-
          ClaimToHeaders maps JWT claim names to upstream request header names.
          The claim value is set as the header value before forwarding.
        items:
          $ref: '#/definitions/model.JWTClaimHeader'
        type: array
      forwardJwt:
        description: |-
          ForwardJWT indicates whether the original Authorization header should be
          forwarded to the upstream after successful validation.
        type: boolean
      issuer:
        description: Issuer is the expected value of the "iss" claim.
        type: string
      jwksInline:
        description: |-
          JWKsInline is a literal JSON Web Key Set document.
          Mutually exclusive with JWKsURI.
        type: string
      jwksUri:
        description: |-
          JWKsURI is the URL from which the JSON Web Key Set is fetched.
          Mutually exclusive with JWKsInline.
        type: string
    type: object
  model.JWTRule:
    properties:
      allowMissing:
        description: |-
          AllowMissing allows requests without a JWT token to pass through.
          Useful for public endpoints that coexist in the same listener.
        type: boolean
      match:
        description: Match is the path prefix this rule applies to.
        type: string
      requires:
        description: |-
          Requires lists the provider names that must validate the request.
          All listed providers must succeed (AND semantics).
        items:
          type: string
        type: array
    type: object
  model.Listener:
    properties:
      address:
        description: |-
          Address is the IP address the listener binds to.
          Defaults to "0.0.0.0" if empty.
        type: string
      filterIds:
        description: |-
          FilterIDs lists the IDs of Filter entities to activate on this listener,
          in evaluation order. The router filter is always added last automatically.
        items:
          type: string
        type: array
      id:
        description: ID is the unique identifier of the listener.
        type: string
      name:
        description: Name is a human-readable label for the listener.
        type: string
      port:
        description: Port is the TCP port the listener binds to.
        type: integer
      tls:
        allOf:
        - $ref: '#/definitions/model.ListenerTLS'
        description: |-
          TLS holds optional TLS termination configuration.
          When nil, the listener operates in plaintext mode.
          NOTE: TLS support is modelled here but not yet implemented in the xDS
          builder. The field is accepted and stored; it has no effect until the
          builder is updated to emit a DownstreamTlsContext.
    type: object
  model.ListenerTLS:
    properties:
      certPath:
        description: CertPath is the path to the PEM-encoded TLS certificate file.
        type: string
      keyPath:
        description: KeyPath is the path to the PEM-encoded private key file.
        type: string
      maxVersion:
        description: |-
          MaxVersion is the maximum TLS protocol version to accept.
          Accepted values: same as MinVersion. If empty, no upper bound is set.
        type: string
      minVersion:
        description: |-
          MinVersion is the minimum TLS protocol version to accept.
          Accepted values: "TLSv1_0", "TLSv1_1", "TLSv1_2", "TLSv1_3".
          Defaults to "TLSv1_2" if empty.
        type: string
    type: object
  model.MatchRule:
    properties:
      headers:
        description: Headers are request header matchers that must all match.
        items:
          $ref: '#/definitions/model.HeaderMatcher'
        type: array
      hostnames:
        description: |-
          Hostnames restricts the match to specific virtual host names.
          An empty slice matches all virtual hosts.
        items:
          type: string
        type: array
      methods:
        description: |-
          Methods lists the HTTP methods this rule applies to.
          An empty slice matches all methods.
        items:
          type: string
        type: array
      path:
        description: Path is the exact path that must match.
        type: string
      pathPrefix:
        description: |-
          PathPrefix is a prefix that the request path must start with.
          Mutually exclusive with Path and PathRegex.
        type: string
      pathRegex:
        description: |-
          PathRegex is a regular expression the request path must match.
          Mutually exclusive with Path and PathPrefix.
        type: string
      ports:
        description: Ports restricts the match to specific listener ports.
        items:
          type: integer
        type: array
      queryParams:
        description: QueryParams are query parameter matchers that must all match.
        items:
          $ref: '#/definitions/model.QueryParamMatcher'
        type: array
    type: object
  model.QueryParamMatcher:
    properties:
      name:
        description: Name is the query parameter name.
        type: string
      regex:
        description: Regex indicates that Value should be treated as a regular expression.
        type: boolean
      value:
        description: Value is the exact value the parameter must have.
        type: string
    type: object
  model.Route:
    properties:
      backends:
        description: |-
          Backends lists the upstream destinations for this route.
          Weights across all backends should sum to 100 when more than one backend
          is defined. If only one backend is provided its weight is ignored.
        items:
          $ref: '#/definitions/model.Backend'
        type: array
      filterOverrides:
        additionalProperties:
          $ref: '#/definitions/model.FilterOverride'
        description: |-
          FilterOverrides carries per-route overrides for filters registered on
          the listener. The map key is the Filter ID. When both the route's group
          and the route itself carry an override for the same filter, the route
          override wins entirely (more specific takes precedence).
        type: object
      id:
        description: ID is the unique identifier of the route.
        type: string
      match:
        allOf:
        - $ref: '#/definitions/model.MatchRule'
        description: Match defines the conditions that a request must satisfy.
      name:
        description: Name is a human-readable label for the route.
        type: string
    type: object
  model.RouteGroup:
    properties:
      filterOverrides:
        additionalProperties:
          $ref: '#/definitions/model.FilterOverride'
        description: |-
          FilterOverrides carries per-group overrides for filters registered on
          the listener. The map key is the Filter ID. These overrides apply to all
          routes in the group. If a route also carries an override for the same
          filter, the route override wins entirely.
        type: object
      headers:
        description: Headers are appended to each referenced route's own header matchers.
        items:
          $ref: '#/definitions/model.HeaderMatcher'
        type: array
      hostnames:
        description: |-
          Hostnames are merged (union) with each referenced route's own hostnames.
          An empty slice means only the route's own hostnames apply.
        items:
          type: string
        type: array
      id:
        description: ID is the unique identifier of the group.
        type: string
      name:
        description: Name is a human-readable label for the group.
        type: string
      pathPrefix:
        description: |-
          PathPrefix is prepended literally to the path/pathPrefix/pathRegex of
          every referenced route. Mutually exclusive with PathRegex.
        type: string
      pathRegex:
        description: |-
          PathRegex is a RE2 regular expression that defines the group's path
          namespace. It is composed with the route's own path specifier according
          to the rules described above. Mutually exclusive with PathPrefix.
        type: string
      routeIds:
        description: |-
          RouteIDs lists the IDs of the routes that belong to this group.
          Routes are independent entities and may be referenced by multiple groups.
        items:
          type: string
        type: array
    type: object
  respond.ErrorBody:
    properties:
      error:
        description: Error contains a human-readable description of what went wrong.
        example: group "abc" not found
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Rutoso project
    url: https://github.com/achetronic/rutoso
  description: |-
    REST API control plane for Envoy proxies. Manage route groups and routes;
    changes are pushed to all connected Envoy instances via xDS in real time.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Rutoso API
  version: "1.0"
paths:
  /filters:
    get:
      description: Returns the full list of filters.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Filter'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: List filters
      tags:
      - filters
    post:
      consumes:
      - application/json
      description: Creates a new HTTP filter entity.
      parameters:
      - description: Filter definition
        in: body
        name: filter
        required: true
        schema:
          $ref: '#/definitions/model.Filter'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Filter'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Create a filter
      tags:
      - filters
  /filters/{filterId}:
    delete:
      description: Deletes the filter with the given ID.
      parameters:
      - description: Filter ID
        in: path
        name: filterId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Delete a filter
      tags:
      - filters
    get:
      description: Returns the filter with the given ID.
      parameters:
      - description: Filter ID
        in: path
        name: filterId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Filter'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Get a filter
      tags:
      - filters
    put:
      consumes:
      - application/json
      description: Replaces the filter with the given ID.
      parameters:
      - description: Filter ID
        in: path
        name: filterId
        required: true
        type: string
      - description: Updated filter definition
        in: body
        name: filter
        required: true
        schema:
          $ref: '#/definitions/model.Filter'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Filter'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Update a filter
      tags:
      - filters
  /groups:
    get:
      description: Returns the full list of route groups.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.RouteGroup'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: List groups
      tags:
      - groups
    post:
      consumes:
      - application/json
      description: Creates a new group referencing existing routes by ID.
      parameters:
      - description: Group definition
        in: body
        name: group
        required: true
        schema:
          $ref: '#/definitions/model.RouteGroup'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.RouteGroup'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Create a group
      tags:
      - groups
  /groups/{groupId}:
    delete:
      description: Deletes the group with the given ID.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Delete a group
      tags:
      - groups
    get:
      description: Returns the group with the given ID.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RouteGroup'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Get a group
      tags:
      - groups
    put:
      consumes:
      - application/json
      description: Replaces the group with the given ID.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        type: string
      - description: Updated group definition
        in: body
        name: group
        required: true
        schema:
          $ref: '#/definitions/model.RouteGroup'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.RouteGroup'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Update a group
      tags:
      - groups
  /listeners:
    get:
      description: Returns the full list of listeners.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Listener'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: List listeners
      tags:
      - listeners
    post:
      consumes:
      - application/json
      description: Creates a new Envoy listener entity.
      parameters:
      - description: Listener definition
        in: body
        name: listener
        required: true
        schema:
          $ref: '#/definitions/model.Listener'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Listener'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Create a listener
      tags:
      - listeners
  /listeners/{listenerId}:
    delete:
      description: Deletes the listener with the given ID.
      parameters:
      - description: Listener ID
        in: path
        name: listenerId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Delete a listener
      tags:
      - listeners
    get:
      description: Returns the listener with the given ID.
      parameters:
      - description: Listener ID
        in: path
        name: listenerId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Listener'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Get a listener
      tags:
      - listeners
    put:
      consumes:
      - application/json
      description: Replaces the listener with the given ID.
      parameters:
      - description: Listener ID
        in: path
        name: listenerId
        required: true
        type: string
      - description: Updated listener definition
        in: body
        name: listener
        required: true
        schema:
          $ref: '#/definitions/model.Listener'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Listener'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorBody'
      summary: Update a listener
      tags:
      - listeners
  /routes:
    get:
      description: Returns the full list of routes.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Route'
            type: array
        "500":
          description: Internal Server Error
          schema:
