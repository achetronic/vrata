basePath: /
definitions:
  model.AccessLogConfig:
    properties:
      json:
        description: |-
          JSON outputs each log entry as a JSON object. When false, outputs
          as key=value pairs on a single line.
        type: boolean
      onRequest:
        allOf:
        - $ref: '#/definitions/model.AccessLogEntry'
        description: |-
          OnRequest defines the fields logged when a request arrives.
          If nil, no request log is emitted.
      onResponse:
        allOf:
        - $ref: '#/definitions/model.AccessLogEntry'
        description: |-
          OnResponse defines the fields logged when the response is sent.
          If nil, no response log is emitted.
      path:
        description: |-
          Path is the file path where access logs are written.
          Use "/dev/stdout" or "stdout" for container-friendly stdout logging.
        type: string
    type: object
  model.AccessLogEntry:
    properties:
      fields:
        additionalProperties:
          type: string
        type: object
    type: object
  model.BackendRef:
    properties:
      destinationId:
        description: DestinationID is the ID of the Destination.
        type: string
      weight:
        description: Weight controls the proportion of traffic. Must sum to 100 across
          backends.
        type: integer
    type: object
  model.BalancingOptions:
    properties:
      algorithm:
        allOf:
        - $ref: '#/definitions/model.LBPolicy'
        description: 'Algorithm selects the load-balancing policy. Default: ROUND_ROBIN.'
      maglevTableSize:
        description: |-
          MaglevTableSize sets the Maglev hash table size.
          Must be a prime number. Default: 65537. Only used with MAGLEV.
        type: integer
      ringSize:
        allOf:
        - $ref: '#/definitions/model.RingSizeOptions'
        description: RingSize tunes the consistent hash ring. Only used with RING_HASH.
    type: object
  model.CORSConfig:
    properties:
      allowCredentials:
        description: AllowCredentials indicates whether the request can include user
          credentials.
        type: boolean
      allowHeaders:
        description: AllowHeaders lists the request headers allowed in CORS requests.
        items:
          type: string
        type: array
      allowMethods:
        description: |-
          AllowMethods lists the HTTP methods allowed in CORS requests.
          Example: ["GET", "POST", "OPTIONS"]
        items:
          type: string
        type: array
      allowOrigins:
        description: |-
          AllowOrigins lists the allowed origin patterns.
          Each entry is matched as an exact string or a regex if Regex is true.
        items:
          $ref: '#/definitions/model.CORSOrigin'
        type: array
      exposeHeaders:
        description: ExposeHeaders lists the response headers the browser is allowed
          to access.
        items:
          type: string
        type: array
      maxAge:
        description: |-
          MaxAge sets the preflight cache duration in seconds.
          Maps to the Access-Control-Max-Age response header.
        type: integer
    type: object
  model.CORSOrigin:
    properties:
      regex:
        description: Regex indicates that Value should be treated as a regular expression.
        type: boolean
      value:
        description: Value is the origin string or regex pattern.
        type: string
    type: object
  model.CircuitBreakerOptions:
    properties:
      maxConnections:
        description: MaxConnections is the maximum number of concurrent TCP connections.
        type: integer
      maxPendingRequests:
        description: MaxPendingRequests is the maximum number of requests queued.
        type: integer
      maxRequests:
        description: MaxRequests is the maximum number of concurrent requests.
        type: integer
      maxRetries:
        description: MaxRetries is the maximum number of concurrent retries.
        type: integer
    type: object
  model.Destination:
    properties:
      host:
        description: |-
          Host is the upstream FQDN or IP address.
          For Kubernetes Services use the full FQDN:
            my-svc.my-namespace.svc.cluster.local
        type: string
      id:
        description: ID is the unique identifier of this destination.
        type: string
      name:
        description: Name is a human-readable label.
        type: string
      options:
        allOf:
        - $ref: '#/definitions/model.DestinationOptions'
        description: Options contains advanced configuration. All fields are optional.
      port:
        description: Port is the upstream TCP port.
        type: integer
    type: object
  model.DestinationDiscovery:
    properties:
      type:
        allOf:
        - $ref: '#/definitions/model.DiscoveryType'
        description: Type selects the discovery mechanism. Currently only "kubernetes".
    type: object
  model.DestinationOptions:
    properties:
      balancing:
        allOf:
        - $ref: '#/definitions/model.BalancingOptions'
        description: Balancing controls the load-balancing algorithm and its parameters.
      circuitBreaker:
        allOf:
        - $ref: '#/definitions/model.CircuitBreakerOptions'
        description: CircuitBreaker limits in-flight traffic to protect the upstream.
      connectTimeout:
        description: |-
          ConnectTimeout is the timeout for establishing a new TCP connection.
          Accepts Go duration strings (e.g. "3s", "500ms"). Default: 5s.
        type: string
      discovery:
        allOf:
        - $ref: '#/definitions/model.DestinationDiscovery'
        description: |-
          Discovery enables dynamic endpoint resolution.
          When nil, Rutoso connects directly to host:port.
      healthCheck:
        allOf:
        - $ref: '#/definitions/model.HealthCheckOptions'
        description: HealthCheck configures active HTTP health checking.
      http2:
        description: HTTP2 enables HTTP/2 to the upstream. Required for gRPC backends.
        type: boolean
      maxRequestsPerConnection:
        description: |-
          MaxRequestsPerConnection drains a connection after this many requests.
          0 means unlimited.
        type: integer
      outlierDetection:
        allOf:
        - $ref: '#/definitions/model.OutlierDetectionOptions'
        description: |-
          OutlierDetection automatically ejects endpoints that return
          consecutive errors, without requiring active health checks.
      tls:
        allOf:
        - $ref: '#/definitions/model.TLSOptions'
        description: TLS controls upstream TLS / mTLS configuration.
    type: object
  model.DiscoveryType:
    enum:
    - kubernetes
    type: string
    x-enum-varnames:
    - DiscoveryTypeKubernetes
  model.ExtAuthzConfig:
    properties:
      destinationId:
        description: DestinationID references the Destination that hosts the authz
          service.
        type: string
      failureModeAllow:
        description: FailureModeAllow lets requests through when the authz service
          is unreachable.
        type: boolean
      includeBody:
        description: IncludeBody forwards the request body to the authz service.
        type: boolean
      mode:
        description: 'Mode selects the transport protocol: "http" or "grpc". Default:
          "http".'
        type: string
      onAllow:
        allOf:
        - $ref: '#/definitions/model.ExtAuthzOnAllow'
        description: OnAllow controls what happens when the authz allows the request.
      onCheck:
        allOf:
        - $ref: '#/definitions/model.ExtAuthzOnCheck'
        description: OnCheck controls what is sent to the authz service.
      onDeny:
        allOf:
        - $ref: '#/definitions/model.ExtAuthzOnDeny'
        description: OnDeny controls what is returned to the client when the authz
          denies.
      path:
        description: Path is the authorization endpoint path (e.g. "/oauth2/auth").
        type: string
      timeout:
        description: Timeout is the check request deadline (e.g. "5s").
        type: string
    type: object
  model.ExtAuthzOnAllow:
    properties:
      copyToUpstream:
        description: |-
          CopyToUpstream lists header name patterns from the authz response
          that are added to the request forwarded to the upstream.
          Supports wildcard suffix: "x-auth-request-*" matches any header
          starting with "x-auth-request-".
        items:
          type: string
        type: array
    type: object
  model.ExtAuthzOnCheck:
    properties:
      forwardHeaders:
        description: |-
          ForwardHeaders lists client request header names to forward to the authz.
          Host, Method, Path, and Content-Length are always sent automatically.
        items:
          type: string
        type: array
      injectHeaders:
        description: |-
          InjectHeaders are additional headers added to the check request.
          Values support interpolation: ${request.host}, ${request.path},
          ${request.method}, ${request.scheme}, ${request.header.X-Custom}.
        items:
          $ref: '#/definitions/model.HeaderValue'
        type: array
    type: object
  model.ExtAuthzOnDeny:
    properties:
      copyToClient:
        description: |-
          CopyToClient lists header name patterns from the authz response
          that are returned to the client. Supports wildcard suffix.
        items:
          type: string
        type: array
    type: object
  model.ExtProcConfig:
    properties:
      destinationId:
        description: |-
          DestinationID references the Destination entity that hosts the
          external processing service. Must be a gRPC service.
        type: string
      processingMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcMode'
        description: |-
          ProcessingMode controls which parts of the HTTP transaction are sent to
          the external processor.
      timeout:
        description: Timeout is the processing request deadline (e.g. "2s").
        type: string
    type: object
  model.ExtProcMode:
    properties:
      requestBodyMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: RequestBodyMode controls processing of the request body.
      requestHeaderMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: RequestHeaderMode controls processing of request headers.
      responseBodyMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: ResponseBodyMode controls processing of the response body.
      responseHeaderMode:
        allOf:
        - $ref: '#/definitions/model.ExtProcPhase'
        description: ResponseHeaderMode controls processing of response headers.
    type: object
  model.ExtProcPhase:
    enum:
    - SKIP
    - SEND
    - BUFFERED
    type: string
    x-enum-varnames:
    - ExtProcPhaseSkip
    - ExtProcPhaseSend
    - ExtProcPhaseBuffered
  model.ForwardAction:
    properties:
      backends:
        description: |-
          Backends lists the upstream Destinations for this route.
          Each entry references a Destination by ID and carries a traffic weight.
          Weights across all backends must sum to 100 when more than one backend
          is defined. If only one backend is provided its weight is ignored.
        items:
          $ref: '#/definitions/model.BackendRef'
        type: array
      hashPolicy:
        description: |-
          HashPolicy controls how Rutoso computes the consistent-hash key for
          sticky sessions. Only relevant when the Destination uses RING_HASH or
          MAGLEV balancing (configured in Destination.Options.Balancing).

          This field lives on the route — not on the Destination — because Rutoso
          evaluates hash_policy at routing time using request attributes (headers,
          cookies, client IP) that are only available in the RouteAction context.
          The Destination defines *which algorithm* and ring parameters to use;
          the route defines *what request data* feeds the hash function.
          Both sides must be configured for sticky sessions to work.

          Entries are evaluated in order; the first one that produces a value wins.
          Evaluated at routing time before selecting an endpoint.
        items:
          $ref: '#/definitions/model.HashPolicy'
        type: array
      maxGrpcTimeout:
        description: |-
          MaxGRPCTimeout caps the timeout that a gRPC client can request via
          the grpc-timeout header. If the client asks for more, Rutoso clamps
          it to this value. Accepts Go duration strings (e.g. "30s").
          Maps to RouteAction.max_grpc_timeout.
        type: string
      mirror:
        allOf:
        - $ref: '#/definitions/model.RouteMirror'
        description: |-
          Mirror sends a copy of the traffic to an additional Destination for
          observability or testing. The mirrored request is fire-and-forget;
          its response is discarded and never affects the client.
      retry:
        allOf:
        - $ref: '#/definitions/model.RouteRetry'
        description: Retry controls automatic retry behaviour when the upstream fails.
      rewrite:
        allOf:
        - $ref: '#/definitions/model.RouteRewrite'
        description: Rewrite transforms the URL before sending the request upstream.
      timeouts:
        allOf:
        - $ref: '#/definitions/model.RouteTimeouts'
        description: Timeouts controls how long the request is allowed to take.
    type: object
  model.HashPolicy:
    properties:
      cookie:
        description: Cookie uses the named cookie as the hash key.
        type: string
      cookieTtl:
        description: CookieTTL is the TTL for auto-generated sticky cookies. Accepts
          Go durations.
        type: string
      header:
        description: Header uses the named request header as the hash key.
        type: string
      sourceIP:
        description: SourceIP uses the client IP as the hash key.
        type: boolean
    type: object
  model.HeaderMatcher:
    properties:
      name:
        description: Name is the header name (case-insensitive).
        type: string
      regex:
        description: Regex indicates that Value should be treated as a regular expression.
        type: boolean
      value:
        description: |-
          Value is the exact value the header must have.
          If empty, only the presence of the header is checked.
        type: string
    type: object
  model.HeaderValue:
    properties:
      append:
        description: |-
          Append controls whether the header is appended (true) or replaced
          (false) if it already exists. Default: true.
        type: boolean
      key:
        description: Key is the header name.
        type: string
      value:
        description: Value is the header value.
        type: string
    type: object
  model.HeadersConfig:
    properties:
      requestHeadersToAdd:
        description: |-
          RequestHeadersToAdd are headers added to the request before forwarding
          to the upstream.
        items:
          $ref: '#/definitions/model.HeaderValue'
        type: array
      requestHeadersToRemove:
        description: |-
          RequestHeadersToRemove are header names removed from the request
          before forwarding.
        items:
          type: string
        type: array
      responseHeadersToAdd:
        description: |-
          ResponseHeadersToAdd are headers added to the response before
          returning to the client.
        items:
          $ref: '#/definitions/model.HeaderValue'
        type: array
      responseHeadersToRemove:
        description: |-
          ResponseHeadersToRemove are header names removed from the response
          before returning to the client.
        items:
          type: string
        type: array
    type: object
  model.HealthCheckOptions:
    properties:
      healthyThreshold:
        description: 'HealthyThreshold is consecutive successes before marking healthy.
          Default: 2.'
        type: integer
      interval:
        description: 'Interval is how often health checks run. Default: "10s".'
        type: string
      path:
        description: Path is the HTTP path for health-check requests. Required.
        type: string
      timeout:
        description: 'Timeout is how long to wait for a response. Default: "5s".'
        type: string
      unhealthyThreshold:
        description: 'UnhealthyThreshold is consecutive failures before marking unhealthy.
          Default: 3.'
        type: integer
    type: object
  model.JWTClaimHeader:
    properties:
      claim:
        description: Claim is the JWT claim name (e.g. "sub", "email").
        type: string
      header:
        description: Header is the request header name that receives the claim value.
        type: string
    type: object
  model.JWTConfig:
    properties:
      providers:
        additionalProperties:
          $ref: '#/definitions/model.JWTProvider'
        description: |-
          Providers is a map of provider name to JWTProvider configuration.
          The map key is referenced from per-route overrides to select a specific
          provider (or disable authentication for that route).
        type: object
      rules:
        description: |-
          Rules defines which request paths require JWT validation and which
          provider to apply. If empty, all paths are validated by all providers.
        items:
          $ref: '#/definitions/model.JWTRule'
        type: array
    type: object
  model.JWTProvider:
    properties:
      audiences:
        description: |-
          Audiences lists the expected "aud" claim values. If empty, audience
          validation is skipped.
        items:
          type: string
        type: array
      claimToHeaders:
        description: |-
          ClaimToHeaders maps JWT claim names to upstream request header names.
          The claim value is set as the header value before forwarding.
        items:
          $ref: '#/definitions/model.JWTClaimHeader'
        type: array
      forwardJwt:
        description: |-
          ForwardJWT indicates whether the original Authorization header should be
          forwarded to the upstream after successful validation.
        type: boolean
      issuer:
        description: Issuer is the expected value of the "iss" claim.
        type: string
      jwksDestinationId:
        description: |-
          JWKsDestinationID references the Destination entity that hosts the
          JWKS endpoint. Required when JWKsURI is set. The Destination's cluster
          (with its TLS config) is used as the upstream for fetching keys.
        type: string
      jwksInline:
        description: |-
          JWKsInline is a literal JSON Web Key Set document.
          Mutually exclusive with JWKsURI.
        type: string
      jwksUri:
        description: |-
          JWKsURI is the URL path from which the JSON Web Key Set is fetched.
          When set, JWKsDestinationID must also be set to identify the upstream
          that serves the JWKS endpoint.
          Mutually exclusive with JWKsInline.
        type: string
    type: object
  model.JWTRule:
    properties:
      allowMissing:
        description: |-
          AllowMissing allows requests without a JWT token to pass through.
          Useful for public endpoints that coexist in the same listener.
        type: boolean
      match:
        description: Match is the path prefix this rule applies to.
        type: string
      requires:
        description: |-
          Requires lists the provider names that must validate the request.
          All listed providers must succeed (AND semantics).
        items:
          type: string
        type: array
    type: object
  model.LBPolicy:
    enum:
    - ROUND_ROBIN
    - LEAST_REQUEST
    - RING_HASH
    - MAGLEV
    - RANDOM
    type: string
    x-enum-varnames:
    - LBPolicyRoundRobin
    - LBPolicyLeastRequest
    - LBPolicyRingHash
    - LBPolicyMaglev
    - LBPolicyRandom
  model.Listener:
    properties:
      address:
        description: |-
          Address is the IP address the listener binds to.
          Defaults to "0.0.0.0" if empty.
        type: string
      http2:
        description: |-
          HTTP2 enables HTTP/2 on this listener. Required for gRPC clients.
          With TLS, Go enables HTTP/2 automatically. Without TLS (h2c), Rutoso
          enables h2c upgrade support.
        type: boolean
      id:
        description: ID is the unique identifier of the listener.
        type: string
      maxRequestHeadersKB:
        description: |-
          MaxRequestHeadersKB limits the total size of request headers in
          kilobytes. Requests exceeding this limit receive a 431 response.
          Default: 0 (no limit).
        type: integer
      name:
        description: Name is a human-readable label for the listener.
        type: string
      port:
        description: Port is the TCP port the listener binds to.
        type: integer
      serverName:
        description: |-
          ServerName sets the "Server" response header.
          When empty, no Server header is added.
        type: string
      tls:
        allOf:
        - $ref: '#/definitions/model.ListenerTLS'
        description: |-
          TLS holds optional TLS termination configuration.
          When nil, the listener operates in plaintext mode.
    type: object
  model.ListenerTLS:
    properties:
      certPath:
        description: CertPath is the path to the PEM-encoded TLS certificate file.
        type: string
      keyPath:
        description: KeyPath is the path to the PEM-encoded private key file.
        type: string
      maxVersion:
        description: |-
          MaxVersion is the maximum TLS protocol version to accept.
          Accepted values: same as MinVersion. If empty, no upper bound is set.
        type: string
      minVersion:
        description: |-
          MinVersion is the minimum TLS protocol version to accept.
          Accepted values: "TLSv1_0", "TLSv1_1", "TLSv1_2", "TLSv1_3".
          Defaults to "TLSv1_2" if empty.
        type: string
    type: object
  model.MatchRule:
    properties:
      grpc:
        description: |-
          GRPC restricts this match to gRPC requests only (content-type
          application/grpc). Maps to RouteMatch.grpc.
        type: boolean
      headers:
        description: Headers are request header matchers that must all match.
        items:
          $ref: '#/definitions/model.HeaderMatcher'
        type: array
      hostnames:
        description: |-
          Hostnames restricts the match to specific virtual host names.
          An empty slice matches all virtual hosts.
        items:
          type: string
        type: array
      methods:
        description: |-
          Methods lists the HTTP methods this rule applies to.
          An empty slice matches all methods.
        items:
          type: string
        type: array
      path:
        description: Path is the exact path that must match.
        type: string
      pathPrefix:
        description: |-
          PathPrefix is a prefix that the request path must start with.
          Mutually exclusive with Path and PathRegex.
        type: string
      pathRegex:
        description: |-
          PathRegex is a regular expression the request path must match.
          Mutually exclusive with Path and PathPrefix.
        type: string
      queryParams:
        description: QueryParams are query parameter matchers that must all match.
        items:
          $ref: '#/definitions/model.QueryParamMatcher'
        type: array
    type: object
  model.Middleware:
    properties:
      accessLog:
        allOf:
        - $ref: '#/definitions/model.AccessLogConfig'
        description: |-
          AccessLog holds the access log configuration.
          Set when Type == "accessLog".
      cors:
        allOf:
        - $ref: '#/definitions/model.CORSConfig'
        description: CORS holds the CORS configuration. Set when Type == "cors".
      extAuthz:
        allOf:
        - $ref: '#/definitions/model.ExtAuthzConfig'
        description: |-
          ExtAuthz holds the external authorisation configuration.
          Set when Type == "extAuthz".
      extProc:
        allOf:
        - $ref: '#/definitions/model.ExtProcConfig'
        description: |-
          ExtProc holds the external processing configuration.
          Set when Type == "extProc".
      headers:
        allOf:
        - $ref: '#/definitions/model.HeadersConfig'
        description: |-
          Headers holds the header mutation filter configuration.
          Set when Type == "headers".
      id:
        description: ID is the unique identifier of the middleware.
        type: string
      jwt:
        allOf:
        - $ref: '#/definitions/model.JWTConfig'
        description: JWT holds the JWT authentication configuration. Set when Type
          == "jwt".
      name:
        description: Name is a human-readable label for the middleware.
        type: string
      rateLimit:
        allOf:
        - $ref: '#/definitions/model.RateLimitConfig'
        description: |-
          RateLimit holds the rate limit configuration.
          Set when Type == "rateLimit".
      type:
        allOf:
        - $ref: '#/definitions/model.MiddlewareType'
        description: |-
          Type identifies which middleware type this entity provides.
          Exactly one of the Config* fields below must match this type.
    type: object
  model.MiddlewareOverride:
    properties:
      disabled:
        description: |-
          Disabled completely disables the filter for this route/group.
          When true, no other field is evaluated.
        type: boolean
      headers:
        allOf:
        - $ref: '#/definitions/model.HeadersConfig'
        description: |-
          Headers overrides header manipulation for this route/group.
          Only meaningful when the referenced filter is of type "headers".
      jwtProvider:
        description: |-
          JWTProvider selects a specific JWT provider by name (instead of requiring all).
          Only meaningful when the referenced filter is of type "jwt".
        type: string
    type: object
  model.MiddlewareType:
    enum:
    - cors
    - jwt
    - extAuthz
    - extProc
    - rateLimit
    - headers
    - accessLog
    type: string
    x-enum-varnames:
    - MiddlewareTypeCORS
    - MiddlewareTypeJWT
    - MiddlewareTypeExtAuthz
    - MiddlewareTypeExtProc
    - MiddlewareTypeRateLimit
    - MiddlewareTypeHeaders
    - MiddlewareTypeAccessLog
  model.OutlierDetectionOptions:
    properties:
      baseEjectionTime:
        description: 'BaseEjectionTime is how long an endpoint stays ejected. Default:
          "30s".'
        type: string
      consecutive5xx:
        description: 'Consecutive5xx is consecutive 5xx responses that trigger ejection.
          Default: 5.'
        type: integer
      consecutiveGatewayErrors:
        description: ConsecutiveGatewayErrors is consecutive 502/503/504 that trigger
          ejection.
        type: integer
      interval:
        description: 'Interval is how often ejection conditions are evaluated. Default:
          "10s".'
        type: string
      maxEjectionPercent:
        description: 'MaxEjectionPercent is the maximum percentage of endpoints ejected.
          Default: 10.'
        type: integer
    type: object
  model.QueryParamMatcher:
    properties:
      name:
        description: Name is the query parameter name.
        type: string
      regex:
        description: Regex indicates that Value should be treated as a regular expression.
        type: boolean
      value:
        description: Value is the exact value the parameter must have.
        type: string
    type: object
  model.RateLimitConfig:
    properties:
      burst:
        description: |-
          Burst is the maximum number of requests allowed in a burst above the
          sustained rate. Default: same as RequestsPerSecond.
        type: integer
      requestsPerSecond:
        description: |-
          RequestsPerSecond is the sustained rate of requests allowed per client IP.
          Default: 10.
        type: number
    type: object
  model.RetryBackoff:
    properties:
      base:
        description: |-
          Base is the initial delay before the first retry.
          Accepts Go duration strings (e.g. "100ms").
        type: string
      max:
        description: |-
          Max is the upper bound on the backoff delay.
          Accepts Go duration strings (e.g. "1s").
        type: string
    type: object
  model.RetryCondition:
    enum:
    - server-error
    - connection-failure
    - gateway-error
    - retriable-codes
    type: string
    x-enum-varnames:
    - RetryOnServerError
    - RetryOnConnectionFailure
    - RetryOnGatewayError
    - RetryOnRetriableCodes
  model.RewriteRegex:
    properties:
      pattern:
        description: Pattern is the RE2 regular expression matched against the request
          path.
        type: string
      substitution:
        description: |-
          Substitution is the replacement string. Capture groups from Pattern
          can be referenced as \1, \2, etc.
        type: string
    type: object
  model.RingSizeOptions:
    properties:
      max:
        description: 'Max is the maximum number of virtual nodes. Default: 8388608.'
        type: integer
      min:
        description: 'Min is the minimum number of virtual nodes. Default: 1024.'
        type: integer
    type: object
  model.Route:
    properties:
      directResponse:
        allOf:
        - $ref: '#/definitions/model.RouteDirectResponse'
        description: |-
          DirectResponse returns a fixed HTTP response without
          contacting any upstream. Useful for health-check endpoints, maintenance
          pages, or returning a static 404.
          Mutually exclusive with Forward and Redirect.
      forward:
        allOf:
        - $ref: '#/definitions/model.ForwardAction'
        description: |-
          Forward proxies the request to one or more upstream
          Destinations. Contains all forwarding behaviour: backends, timeouts,
          retries, URL rewriting, and traffic mirroring.
          Mutually exclusive with Redirect and DirectResponse.
      id:
        description: ID is the unique identifier of the route.
        type: string
      match:
        allOf:
        - $ref: '#/definitions/model.MatchRule'
        description: Match defines the conditions that a request must satisfy.
      middlewareIds:
        description: |-
          MiddlewareIDs lists the IDs of Middleware entities active on this route.
          The builder activates them
          only for this route (other routes where the middleware is not listed
          are not active)..
        items:
          type: string
        type: array
      middlewareOverrides:
        additionalProperties:
          $ref: '#/definitions/model.MiddlewareOverride'
        description: |-
          MiddlewareOverrides carries per-route overrides for active middlewares.
          The map key is the Middleware ID. When both the route's group and the
          route itself carry an override for the same middleware, the route
          override wins entirely (more specific takes precedence).
        type: object
      name:
        description: Name is a human-readable label for the route.
        type: string
      redirect:
        allOf:
        - $ref: '#/definitions/model.RouteRedirect'
        description: |-
          Redirect returns an HTTP redirect to the client
          instead of forwarding to an upstream.
          Mutually exclusive with Forward and DirectResponse.
    type: object
  model.RouteDirectResponse:
    properties:
      body:
        description: Body is the response body returned to the client. Optional.
        type: string
      status:
        description: Status is the HTTP status code to return. Required.
        type: integer
    type: object
  model.RouteGroup:
    properties:
      headers:
        description: Headers are appended to each referenced route's own header matchers.
        items:
          $ref: '#/definitions/model.HeaderMatcher'
        type: array
      hostnames:
        description: |-
          Hostnames are merged (union) with each referenced route's own hostnames.
          An empty slice means only the route's own hostnames apply.
        items:
          type: string
        type: array
      id:
        description: ID is the unique identifier of the group.
        type: string
      includeAttemptCount:
        description: |-
          IncludeAttemptCount makes Rutoso add the X-Request-Attempt-Count header
          to upstream requests, indicating how many times the request has been
          attempted (including the original). Maps to
          VirtualHost.include_request_attempt_count.
        type: boolean
      middlewareIds:
        description: |-
          MiddlewareIDs lists the IDs of Middleware entities active on all routes
          in this group. The builder activates them
          and enables them for every route in the group.
        items:
          type: string
        type: array
      middlewareOverrides:
        additionalProperties:
          $ref: '#/definitions/model.MiddlewareOverride'
        description: |-
          MiddlewareOverrides carries per-group overrides for active middlewares.
          The map key is the Middleware ID. These overrides apply to all routes
          in the group. If a route also carries an override for the same
          middleware, the route override wins entirely.
        type: object
      name:
        description: Name is a human-readable label for the group.
        type: string
      pathPrefix:
        description: |-
          PathPrefix is prepended literally to the path/pathPrefix/pathRegex of
          every referenced route. Mutually exclusive with PathRegex.
        type: string
      pathRegex:
        description: |-
          PathRegex is a RE2 regular expression that defines the group's path
          namespace. It is composed with the route's own path specifier according
          to the rules described above. Mutually exclusive with PathPrefix.
        type: string
      retryDefault:
        allOf:
        - $ref: '#/definitions/model.RouteRetry'
        description: |-
          RetryDefault is the default retry policy applied to all routes in this
          group. Individual routes can override this by setting their own
          ForwardAction.Retry. Maps to VirtualHost.retry_policy.
      routeIds:
        description: |-
          RouteIDs lists the IDs of the routes that belong to this group.
          Routes are independent entities and may be referenced by multiple groups.
        items:
          type: string
        type: array
    type: object
  model.RouteMirror:
    properties:
      destinationId:
        description: |-
          DestinationID is the ID of the Destination that receives the
          mirrored traffic.
        type: string
      percentage:
        description: |-
          Percentage is the fraction of requests to mirror, from 0 to 100.
          Default: 100 (mirror all matched traffic).
        type: integer
    type: object
  model.RouteRedirect:
    properties:
      code:
        description: |-
          Code is the HTTP status code returned to the client.
          Accepted values: 301, 302, 303, 307, 308. Default: 301.
        type: integer
      host:
        description: Host overrides only the hostname in the redirect target.
        type: string
      path:
        description: Path replaces the path component of the redirect target.
        type: string
      scheme:
        description: Scheme overrides only the scheme (e.g. "http" → "https").
        type: string
      stripQuery:
        description: StripQuery removes the query string from the redirect target.
        type: boolean
      url:
        description: |-
          URL is the complete target URL. When set, Scheme, Host, Path, and
          StripQuery are ignored — the client is sent directly to this URL.
        type: string
    type: object
  model.RouteRetry:
    properties:
      attempts:
        description: |-
          Attempts is the maximum number of times the request is retried.
          The original request does not count — setting 3 means up to 3 retries
          after the first failure (4 total attempts).
        type: integer
      backoff:
        allOf:
        - $ref: '#/definitions/model.RetryBackoff'
        description: Backoff controls the delay between retry attempts.
      "on":
        description: |-
          On lists the conditions that trigger a retry. When empty, defaults
          to ["server-error", "connection-failure"].
        items:
          $ref: '#/definitions/model.RetryCondition'
        type: array
      perAttemptTimeout:
        description: |-
          PerAttemptTimeout is the deadline for each individual attempt.
          Accepts Go duration strings (e.g. "5s").
        type: string
      retriableCodes:
        description: |-
          RetriableCodes is the explicit list of HTTP status codes that trigger
          a retry. Only evaluated when On contains "retriable-codes".
        items:
          type: integer
        type: array
    type: object
  model.RouteRewrite:
    properties:
      autoHost:
        description: |-
          AutoHost sets the Host header to the hostname of the upstream
          Destination automatically. Useful when the backend requires its own
          hostname (e.g. an external SaaS API).
        type: boolean
      host:
        description: Host overrides the Host header sent to the upstream with a fixed
          value.
        type: string
      hostFromHeader:
        description: |-
          HostFromHeader takes the value of the named request header and uses it
          as the Host header sent to the upstream.
        type: string
      path:
        description: |-
          Path replaces the matched path prefix with the given value.
          For example, if the route matches "/api/v1" and Path is "/internal",
          a request to "/api/v1/users" arrives at the backend as "/internal/users".
        type: string
      pathRegex:
        allOf:
        - $ref: '#/definitions/model.RewriteRegex'
        description: PathRegex rewrites the path using a regular expression substitution.
    type: object
  model.RouteTimeouts:
    properties:
      idle:
        description: |-
          Idle is the maximum time a connection may remain open with no data
          flowing. Accepts Go duration strings. Useful for long-lived streaming
          connections that may stall.
        type: string
      request:
        description: |-
          Request is the total time the entire request may take from the moment
          Rutoso receives the first byte from the client until the response is
          fully sent. Accepts Go duration strings (e.g. "30s", "1m").
        type: string
    type: object
  model.Snapshot:
    properties:
      destinations:
        items:
          $ref: '#/definitions/model.Destination'
        type: array
      groups:
        items:
          $ref: '#/definitions/model.RouteGroup'
        type: array
      listeners:
        items:
          $ref: '#/definitions/model.Listener'
        type: array
      middlewares:
        items:
          $ref: '#/definitions/model.Middleware'
        type: array
      routes:
        items:
          $ref: '#/definitions/model.Route'
        type: array
    type: object
  model.TLSMode:
    enum:
    - none
    - tls
    - mtls
    type: string
    x-enum-comments:
      TLSModeMTLS: mutual TLS — present client certificate
      TLSModeNone: plaintext (default)
      TLSModeTLS: TLS — verify server certificate
    x-enum-varnames:
    - TLSModeNone
    - TLSModeTLS
    - TLSModeMTLS
  model.TLSOptions:
    properties:
      caFile:
        description: |-
          CAFile is the path to the CA certificate PEM file. When empty,
          the system CA bundle (/etc/ssl/certs/ca-certificates.crt) is used.
        type: string
      certFile:
        description: |-
          CertFile is the path to the client certificate PEM file.
          Required when Mode is mtls.
        type: string
      keyFile:
        description: |-
          KeyFile is the path to the client private key PEM file.
          Required when Mode is mtls.
        type: string
      maxVersion:
        description: MaxVersion is the maximum TLS protocol version.
        type: string
      minVersion:
        description: |-
          MinVersion is the minimum TLS protocol version.
          Accepted values: "TLSv1_0", "TLSv1_1", "TLSv1_2", "TLSv1_3".
        type: string
      mode:
        allOf:
        - $ref: '#/definitions/model.TLSMode'
        description: 'Mode selects the connection security model. Default: none (plaintext).'
      sni:
        description: |-
          SNI overrides the Server Name Indication sent during TLS handshake.
          When empty, the destination host is used.
        type: string
    type: object
  respond.ErrorBody:
    properties:
      error:
        description: Error contains a human-readable description of what went wrong.
        example: group "abc" not found
        type: string
    type: object
