components:
  schemas:
    model.AccessLogConfig:
      description: |-
        AccessLog configures access logging for this listener.
        When nil, no access logs are emitted.
        Maps to HttpConnectionManager.access_log.
      properties:
        format:
          description: |-
            Format is the log line format using Envoy's command operator syntax.
            When empty, Envoy uses its default format.
            Example: "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL% %RESPONSE_CODE%"
          type: string
        json:
          description: |-
            JSON switches the log output to JSON format. When true, Format is
            interpreted as a JSON template (map of key to format string).
            When false, Format is used as a plain text template.
          type: boolean
        path:
          description: |-
            Path is the file path where access logs are written.
            Use "/dev/stdout" for container-friendly stdout logging.
          type: string
      type: object
    model.BackendRef:
      properties:
        destinationId:
          description: DestinationID is the ID of the Destination this backend points
            to.
          type: string
        weight:
          description: |-
            Weight controls the proportion of traffic sent to this Destination
            when multiple backends are defined. Values across all BackendRefs in
            a Route must sum to 100.
          type: integer
      type: object
    model.BalancingOptions:
      description: |-
        Balancing controls the load-balancing algorithm and its parameters.
        Maps to Cluster.lb_policy + ring_hash_lb_config / maglev_lb_config.
      properties:
        algorithm:
          $ref: '#/components/schemas/model.LBPolicy'
        maglevTableSize:
          description: |-
            MaglevTableSize sets the Maglev hash table size.
            Must be a prime number. Default: 65537.
            Ignored unless Algorithm is MAGLEV.
            Maps to Cluster.maglev_lb_config.table_size.
          type: integer
        ringSize:
          $ref: '#/components/schemas/model.RingSizeOptions'
      type: object
    model.CORSConfig:
      description: CORS holds the CORS filter configuration. Set when Type == "cors".
      properties:
        allowCredentials:
          description: AllowCredentials indicates whether the request can include
            user credentials.
          type: boolean
        allowHeaders:
          description: AllowHeaders lists the request headers allowed in CORS requests.
          items:
            type: string
          type: array
          uniqueItems: false
        allowMethods:
          description: |-
            AllowMethods lists the HTTP methods allowed in CORS requests.
            Example: ["GET", "POST", "OPTIONS"]
          items:
            type: string
          type: array
          uniqueItems: false
        allowOrigins:
          description: |-
            AllowOrigins lists the allowed origin patterns.
            Each entry is matched as an exact string or a regex if Regex is true.
          items:
            $ref: '#/components/schemas/model.CORSOrigin'
          type: array
          uniqueItems: false
        exposeHeaders:
          description: ExposeHeaders lists the response headers the browser is allowed
            to access.
          items:
            type: string
          type: array
          uniqueItems: false
        maxAge:
          description: |-
            MaxAge sets the preflight cache duration in seconds.
            Maps to the Access-Control-Max-Age response header.
          type: integer
      type: object
    model.CORSOrigin:
      properties:
        regex:
          description: Regex indicates that Value should be treated as a regular expression.
          type: boolean
        value:
          description: Value is the origin string or regex pattern.
          type: string
      type: object
    model.CircuitBreakerOptions:
      description: |-
        CircuitBreaker limits in-flight traffic to protect the upstream.
        Maps to Cluster.circuit_breakers.thresholds.
      properties:
        maxConnections:
          description: |-
            MaxConnections is the maximum number of concurrent TCP connections.
            Maps to max_connections.
          type: integer
        maxPendingRequests:
          description: |-
            MaxPendingRequests is the maximum number of requests queued while
            waiting for a connection. Maps to max_pending_requests.
          type: integer
        maxRequests:
          description: |-
            MaxRequests is the maximum number of concurrent requests.
            Maps to max_requests.
          type: integer
        maxRetries:
          description: |-
            MaxRetries is the maximum number of concurrent retries.
            Maps to max_retries.
          type: integer
      type: object
    model.Destination:
      properties:
        host:
          description: |-
            Host is the upstream FQDN or IP address.
            For Kubernetes Services use the full FQDN:
              pepe.default.svc.cluster.local
            When Options.Discovery.Type is "kubernetes" the service name and
            namespace are parsed from this field automatically.
          type: string
        id:
          description: ID is the unique identifier of this destination.
          type: string
        name:
          description: Name is a human-readable label.
          type: string
        options:
          $ref: '#/components/schemas/model.DestinationOptions'
        port:
          description: Port is the upstream TCP port.
          type: integer
      type: object
    model.DestinationDiscovery:
      description: |-
        Discovery enables dynamic endpoint resolution.
        When nil, Rutoso derives the Envoy cluster type from the host value:
          IP address  → STATIC
          FQDN        → STRICT_DNS
      properties:
        type:
          $ref: '#/components/schemas/model.DiscoveryType'
      type: object
    model.DestinationOptions:
      description: |-
        Options contains advanced Envoy cluster configuration.
        All fields are optional — sensible defaults are applied when omitted.
      properties:
        balancing:
          $ref: '#/components/schemas/model.BalancingOptions'
        circuitBreaker:
          $ref: '#/components/schemas/model.CircuitBreakerOptions'
        connectTimeout:
          description: |-
            ConnectTimeout is the timeout for establishing a new TCP connection
            to the upstream. Accepts Go duration strings (e.g. "3s", "500ms").
            Maps to Cluster.connect_timeout. Default: 5s.
          type: string
        discovery:
          $ref: '#/components/schemas/model.DestinationDiscovery'
        dnsLookupFamily:
          description: |-
            DNSLookupFamily selects the IP version for DNS resolution.
            Accepted values: "AUTO", "V4_ONLY", "V6_ONLY". Default: "AUTO".
            Maps to Cluster.dns_lookup_family.
          type: string
        dnsRefreshRate:
          description: |-
            DNSRefreshRate controls how often STRICT_DNS clusters re-resolve the
            host. Ignored for STATIC and EDS clusters. Accepts Go duration strings.
            Default: "5s". Maps to Cluster.dns_refresh_rate.
          type: string
        healthCheck:
          $ref: '#/components/schemas/model.HealthCheckOptions'
        http2:
          description: |-
            HTTP2 enables HTTP/2 to the upstream. Required when the backend speaks
            gRPC or HTTP/2. Maps to Cluster.typed_extension_protocol_options with
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions.
          type: boolean
        maxRequestsPerConnection:
          description: |-
            MaxRequestsPerConnection drains a connection to the upstream after this
            many requests. 0 means unlimited. Useful for load balancing across new
            pods. Maps to Cluster.max_requests_per_connection.
          type: integer
        outlierDetection:
          $ref: '#/components/schemas/model.OutlierDetectionOptions'
        slowStart:
          $ref: '#/components/schemas/model.SlowStartOptions'
        tls:
          $ref: '#/components/schemas/model.TLSOptions'
      type: object
    model.DiscoveryType:
      description: |-
        Type selects the discovery mechanism.
        Currently only "kubernetes" is supported.
      enum:
      - kubernetes
      type: string
      x-enum-varnames:
      - DiscoveryTypeKubernetes
    model.ExtAuthzConfig:
      description: |-
        ExtAuthz holds the external authorisation filter configuration.
        Set when Type == "extAuthz".
      properties:
        destinationId:
          description: |-
            DestinationID references the Destination entity that hosts the
            authorisation service. The Destination's cluster (with its TLS,
            timeouts, health checks, etc.) is used as the upstream for ext_authz.
          type: string
        failureModeAllow:
          description: |-
            FailureModeAllow controls what happens when the authz service is
            unreachable. If true, requests are allowed through (fail-open).
            Default is false (fail-closed).
          type: boolean
        includeRequestBodyInCheck:
          description: IncludeRequestBodyInCheck forwards the request body to the
            authz service.
          type: boolean
        mode:
          description: |-
            Mode selects the transport protocol to the authz service.
            "grpc" or "http". Default: "http".
          type: string
        timeout:
          description: Timeout is the authorisation request deadline (e.g. "5s", "500ms").
          type: string
        uri:
          description: |-
            URI is the full URL of the HTTP authorization endpoint that Envoy
            sends check requests to (e.g. "https://oauth2-proxy.example.com/oauth2/auth").
            The host portion is used for the Host header; the cluster from
            DestinationID handles the actual TCP connection (with TLS, etc.).
            Only used in HTTP mode. Ignored in gRPC mode.
          type: string
      type: object
    model.ExtProcConfig:
      description: |-
        ExtProc holds the external processing filter configuration.
        Set when Type == "extProc".
      properties:
        destinationId:
          description: |-
            DestinationID references the Destination entity that hosts the
            external processing service. Must be a gRPC service.
          type: string
        processingMode:
          $ref: '#/components/schemas/model.ExtProcMode'
        timeout:
          description: Timeout is the processing request deadline (e.g. "2s").
          type: string
      type: object
    model.ExtProcMode:
      description: |-
        ProcessingMode controls which parts of the HTTP transaction are sent to
        the external processor.
      properties:
        requestBodyMode:
          $ref: '#/components/schemas/model.ExtProcPhase'
        requestHeaderMode:
          $ref: '#/components/schemas/model.ExtProcPhase'
        responseBodyMode:
          $ref: '#/components/schemas/model.ExtProcPhase'
        responseHeaderMode:
          $ref: '#/components/schemas/model.ExtProcPhase'
      type: object
    model.ExtProcPhase:
      description: ResponseBodyMode controls processing of the response body.
      enum:
      - SKIP
      - SEND
      - BUFFERED
      type: string
      x-enum-varnames:
      - ExtProcPhaseSkip
      - ExtProcPhaseSend
      - ExtProcPhaseBuffered
    model.ForwardAction:
      description: |-
        Forward instructs Envoy to proxy the request to one or more upstream
        Destinations. Contains all forwarding behaviour: backends, timeouts,
        retries, URL rewriting, and traffic mirroring.
        Mutually exclusive with Redirect and DirectResponse.
      properties:
        backends:
          description: |-
            Backends lists the upstream Destinations for this route.
            Each entry references a Destination by ID and carries a traffic weight.
            Weights across all backends must sum to 100 when more than one backend
            is defined. If only one backend is provided its weight is ignored.
          items:
            $ref: '#/components/schemas/model.BackendRef'
          type: array
          uniqueItems: false
        hashPolicy:
          description: |-
            HashPolicy controls how Envoy computes the consistent-hash key for
            sticky sessions. Only relevant when the Destination uses RING_HASH or
            MAGLEV balancing (configured in Destination.Options.Balancing).

            This field lives on the route — not on the Destination — because Envoy
            evaluates hash_policy at routing time using request attributes (headers,
            cookies, client IP) that are only available in the RouteAction context.
            The Destination defines *which algorithm* and ring parameters to use;
            the route defines *what request data* feeds the hash function.
            Both sides must be configured for sticky sessions to work.

            Entries are evaluated in order; the first one that produces a value wins.
            Maps to RouteAction.hash_policy in Envoy.
          items:
            $ref: '#/components/schemas/model.HashPolicy'
          type: array
          uniqueItems: false
        internalRedirect:
          $ref: '#/components/schemas/model.InternalRedirectPolicy'
        maxGrpcTimeout:
          description: |-
            MaxGRPCTimeout caps the timeout that a gRPC client can request via
            the grpc-timeout header. If the client asks for more, Envoy clamps
            it to this value. Accepts Go duration strings (e.g. "30s").
            Maps to RouteAction.max_grpc_timeout.
          type: string
        mirror:
          $ref: '#/components/schemas/model.RouteMirror'
        retry:
          $ref: '#/components/schemas/model.RouteRetry'
        rewrite:
          $ref: '#/components/schemas/model.RouteRewrite'
        timeouts:
          $ref: '#/components/schemas/model.RouteTimeouts'
        websocket:
          description: |-
            Websocket enables HTTP/1.1 WebSocket upgrade for this route.
            When true, Envoy allows clients to upgrade the connection to a
            WebSocket and proxies frames bidirectionally to the upstream.
            Maps to RouteAction.upgrade_configs with type "websocket".
          type: boolean
      type: object
    model.HashPolicy:
      properties:
        cookie:
          description: |-
            Cookie uses the named cookie as the hash key. If the cookie is absent
            Envoy creates it with the given TTL (e.g. "3600s").
          type: string
        cookieTtl:
          description: |-
            CookieTTL is the TTL Envoy sets when generating a new sticky cookie.
            Ignored unless Cookie is set. Accepts Go duration strings.
          type: string
        header:
          description: Header uses the value of the named request header as the hash
            key.
          type: string
        sourceIP:
          description: SourceIP uses the downstream client IP as the hash key.
          type: boolean
      type: object
    model.HeaderMatcher:
      properties:
        name:
          description: Name is the header name (case-insensitive).
          type: string
        regex:
          description: Regex indicates that Value should be treated as a regular expression.
          type: boolean
        value:
          description: |-
            Value is the exact value the header must have.
            If empty, only the presence of the header is checked.
          type: string
      type: object
    model.HeaderValue:
      properties:
        append:
          description: |-
            Append controls whether the header is appended (true) or replaced
            (false) if it already exists. Default: true.
          type: boolean
        key:
          description: Key is the header name.
          type: string
        value:
          description: Value is the header value.
          type: string
      type: object
    model.HeadersConfig:
      description: |-
        Headers holds the header mutation filter configuration.
        Set when Type == "headers".
      properties:
        requestHeadersToAdd:
          description: |-
            RequestHeadersToAdd are headers added to the request before forwarding
            to the upstream.
          items:
            $ref: '#/components/schemas/model.HeaderValue'
          type: array
          uniqueItems: false
        requestHeadersToRemove:
          description: |-
            RequestHeadersToRemove are header names removed from the request
            before forwarding.
          items:
            type: string
          type: array
          uniqueItems: false
        responseHeadersToAdd:
          description: |-
            ResponseHeadersToAdd are headers added to the response before
            returning to the client.
          items:
            $ref: '#/components/schemas/model.HeaderValue'
          type: array
          uniqueItems: false
        responseHeadersToRemove:
          description: |-
            ResponseHeadersToRemove are header names removed from the response
            before returning to the client.
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    model.HealthCheckOptions:
      description: |-
        HealthCheck configures active HTTP health checking against the upstream.
        Maps to Cluster.health_checks.
      properties:
        healthyThreshold:
          description: |-
            HealthyThreshold is the number of consecutive successes before an
            unhealthy endpoint is returned to the pool. Default: 2.
            Maps to healthy_threshold.
          type: integer
        interval:
          description: |-
            Interval is how often Envoy sends a health-check request.
            Accepts Go duration strings. Default: "10s".
            Maps to interval.
          type: string
        path:
          description: |-
            Path is the HTTP path Envoy sends health-check requests to.
            Example: "/healthz". Required.
            Maps to http_health_check.path.
          type: string
        timeout:
          description: |-
            Timeout is how long Envoy waits for a health-check response.
            Accepts Go duration strings. Default: "5s".
            Maps to timeout.
          type: string
        unhealthyThreshold:
          description: |-
            UnhealthyThreshold is the number of consecutive failures before an
            endpoint is marked unhealthy. Default: 3.
            Maps to unhealthy_threshold.
          type: integer
      type: object
    model.InternalRedirectPolicy:
      description: |-
        InternalRedirect controls Envoy's behaviour when the upstream returns
        a redirect (3xx). Instead of forwarding the redirect to the client,
        Envoy can follow it internally and return the final response.
      properties:
        allowCrossScheme:
          description: |-
            AllowCrossScheme allows internal redirects that change the scheme
            (e.g. http to https). Default: false.
          type: boolean
        maxRedirects:
          description: |-
            MaxRedirects is the maximum number of internal redirects Envoy will
            follow before returning the redirect to the client. Default: 1.
          type: integer
        redirectCodes:
          description: |-
            RedirectCodes lists the HTTP status codes treated as redirects.
            Default: [302]. Other common values: 301, 303, 307, 308.
          items:
            type: integer
          type: array
          uniqueItems: false
      type: object
    model.JWTClaimHeader:
      properties:
        claim:
          description: Claim is the JWT claim name (e.g. "sub", "email").
          type: string
        header:
          description: Header is the request header name that receives the claim value.
          type: string
      type: object
    model.JWTConfig:
      description: JWT holds the JWT authn filter configuration. Set when Type ==
        "jwt".
      properties:
        providers:
          additionalProperties:
            $ref: '#/components/schemas/model.JWTProvider'
          description: |-
            Providers is a map of provider name to JWTProvider configuration.
            The map key is referenced from per-route overrides to select a specific
            provider (or disable authentication for that route).
          type: object
        rules:
          description: |-
            Rules defines which request paths require JWT validation and which
            provider to apply. If empty, all paths are validated by all providers.
          items:
            $ref: '#/components/schemas/model.JWTRule'
          type: array
          uniqueItems: false
      type: object
    model.JWTProvider:
      properties:
        audiences:
          description: |-
            Audiences lists the expected "aud" claim values. If empty, audience
            validation is skipped.
          items:
            type: string
          type: array
          uniqueItems: false
        claimToHeaders:
          description: |-
            ClaimToHeaders maps JWT claim names to upstream request header names.
            The claim value is set as the header value before forwarding.
          items:
            $ref: '#/components/schemas/model.JWTClaimHeader'
          type: array
          uniqueItems: false
        forwardJwt:
          description: |-
            ForwardJWT indicates whether the original Authorization header should be
            forwarded to the upstream after successful validation.
          type: boolean
        issuer:
          description: Issuer is the expected value of the "iss" claim.
          type: string
        jwksDestinationId:
          description: |-
            JWKsDestinationID references the Destination entity that hosts the
            JWKS endpoint. Required when JWKsURI is set. The Destination's cluster
            (with its TLS config) is used as the upstream for fetching keys.
          type: string
        jwksInline:
          description: |-
            JWKsInline is a literal JSON Web Key Set document.
            Mutually exclusive with JWKsURI.
          type: string
        jwksUri:
          description: |-
            JWKsURI is the URL path from which the JSON Web Key Set is fetched.
            When set, JWKsDestinationID must also be set to identify the upstream
            that serves the JWKS endpoint.
            Mutually exclusive with JWKsInline.
          type: string
      type: object
    model.JWTRule:
      properties:
        allowMissing:
          description: |-
            AllowMissing allows requests without a JWT token to pass through.
            Useful for public endpoints that coexist in the same listener.
          type: boolean
        match:
          description: Match is the path prefix this rule applies to.
          type: string
        requires:
          description: |-
            Requires lists the provider names that must validate the request.
            All listed providers must succeed (AND semantics).
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    model.LBPolicy:
      description: |-
        Algorithm selects the load-balancing policy.
        Default: ROUND_ROBIN.
        Maps to Cluster.lb_policy.
      enum:
      - ROUND_ROBIN
      - LEAST_REQUEST
      - RING_HASH
      - MAGLEV
      - RANDOM
      type: string
      x-enum-varnames:
      - LBPolicyRoundRobin
      - LBPolicyLeastRequest
      - LBPolicyRingHash
      - LBPolicyMaglev
      - LBPolicyRandom
    model.Listener:
      properties:
        accessLog:
          $ref: '#/components/schemas/model.AccessLogConfig'
        address:
          description: |-
            Address is the IP address the listener binds to.
            Defaults to "0.0.0.0" if empty.
          type: string
        http2:
          description: |-
            HTTP2 enables HTTP/2 on this listener. Required for gRPC clients.
            When true, the HCM codec type is set to AUTO (accepts both HTTP/1.1
            and HTTP/2). When false, only HTTP/1.1 is accepted.
            Maps to HttpConnectionManager.codec_type.
          type: boolean
        id:
          description: ID is the unique identifier of the listener.
          type: string
        listenerFilters:
          description: |-
            ListenerFilters are TCP-level filters evaluated before the HTTP
            connection manager. Common examples: tls_inspector (required for
            TLS/SNI), proxy_protocol (PROXY protocol v1/v2 from load balancers).
            Maps to Listener.listener_filters.
          items:
            $ref: '#/components/schemas/model.ListenerFilter'
          type: array
          uniqueItems: false
        maxRequestHeadersKB:
          description: |-
            MaxRequestHeadersKB limits the total size of request headers in
            kilobytes. Requests exceeding this limit receive a 431 response.
            Default: 60 (Envoy's default). Maps to HCM.max_request_headers_kb.
          type: integer
        name:
          description: Name is a human-readable label for the listener.
          type: string
        port:
          description: Port is the TCP port the listener binds to.
          type: integer
        serverName:
          description: |-
            ServerName sets the "server" header Envoy adds to responses.
            When empty, Envoy uses its default ("envoy").
            Maps to HttpConnectionManager.server_name.
          type: string
        tls:
          $ref: '#/components/schemas/model.ListenerTLS'
      type: object
    model.ListenerFilter:
      properties:
        type:
          $ref: '#/components/schemas/model.ListenerFilterType'
      type: object
    model.ListenerFilterType:
      description: Type selects the listener filter.
      enum:
      - tls_inspector
      - proxy_protocol
      - original_dst
      type: string
      x-enum-varnames:
      - ListenerFilterTLSInspector
      - ListenerFilterProxyProtocol
      - ListenerFilterOriginalDst
    model.ListenerTLS:
      description: |-
        TLS holds optional TLS termination configuration.
        When nil, the listener operates in plaintext mode.
        NOTE: TLS support is modelled here but not yet implemented in the xDS
        builder. The field is accepted and stored; it has no effect until the
        builder is updated to emit a DownstreamTlsContext.
      properties:
        certPath:
          description: CertPath is the path to the PEM-encoded TLS certificate file.
          type: string
        keyPath:
          description: KeyPath is the path to the PEM-encoded private key file.
          type: string
        maxVersion:
          description: |-
            MaxVersion is the maximum TLS protocol version to accept.
            Accepted values: same as MinVersion. If empty, no upper bound is set.
          type: string
        minVersion:
          description: |-
            MinVersion is the minimum TLS protocol version to accept.
            Accepted values: "TLSv1_0", "TLSv1_1", "TLSv1_2", "TLSv1_3".
            Defaults to "TLSv1_2" if empty.
          type: string
      type: object
    model.MatchRule:
      description: Match defines the conditions that a request must satisfy.
      properties:
        grpc:
          description: |-
            GRPC restricts this match to gRPC requests only (content-type
            application/grpc). Maps to RouteMatch.grpc.
          type: boolean
        headers:
          description: Headers are request header matchers that must all match.
          items:
            $ref: '#/components/schemas/model.HeaderMatcher'
          type: array
          uniqueItems: false
        hostnames:
          description: |-
            Hostnames restricts the match to specific virtual host names.
            An empty slice matches all virtual hosts.
          items:
            type: string
          type: array
          uniqueItems: false
        methods:
          description: |-
            Methods lists the HTTP methods this rule applies to.
            An empty slice matches all methods.
          items:
            type: string
          type: array
          uniqueItems: false
        path:
          description: Path is the exact path that must match.
          type: string
        pathPrefix:
          description: |-
            PathPrefix is a prefix that the request path must start with.
            Mutually exclusive with Path and PathRegex.
          type: string
        pathRegex:
          description: |-
            PathRegex is a regular expression the request path must match.
            Mutually exclusive with Path and PathPrefix.
          type: string
        queryParams:
          description: QueryParams are query parameter matchers that must all match.
          items:
            $ref: '#/components/schemas/model.QueryParamMatcher'
          type: array
          uniqueItems: false
      type: object
    model.Middleware:
      properties:
        cors:
          $ref: '#/components/schemas/model.CORSConfig'
        extAuthz:
          $ref: '#/components/schemas/model.ExtAuthzConfig'
        extProc:
          $ref: '#/components/schemas/model.ExtProcConfig'
        headers:
          $ref: '#/components/schemas/model.HeadersConfig'
        id:
          description: ID is the unique identifier of the filter.
          type: string
        jwt:
          $ref: '#/components/schemas/model.JWTConfig'
        name:
          description: Name is a human-readable label for the filter.
          type: string
        rateLimit:
          $ref: '#/components/schemas/model.RateLimitConfig'
        type:
          $ref: '#/components/schemas/model.MiddlewareType'
      type: object
    model.MiddlewareOverride:
      properties:
        disabled:
          description: |-
            Disabled completely disables the filter for this route/group.
            When true, no other field is evaluated.
          type: boolean
        extAuthzContextExtensions:
          additionalProperties:
            type: string
          description: |-
            ExtAuthzContextExtensions adds key/value pairs to the ext_authz check request.
            Only meaningful when the referenced filter is of type "extAuthz".
          type: object
        extProcMode:
          $ref: '#/components/schemas/model.ExtProcMode'
        headers:
          $ref: '#/components/schemas/model.HeadersConfig'
        jwtProvider:
          description: |-
            JWTProvider selects a specific JWT provider by name (instead of requiring all).
            Only meaningful when the referenced filter is of type "jwt".
          type: string
        rateLimitDescriptors:
          description: |-
            RateLimitDescriptors defines the rate limit descriptors sent to the
            rate limit service for this route/group.
            Only meaningful when the referenced filter is of type "rateLimit".
          items:
            $ref: '#/components/schemas/model.RateLimitDescriptor'
          type: array
          uniqueItems: false
      type: object
    model.MiddlewareType:
      description: |-
        Type identifies which Envoy HTTP filter this entity configures.
        Exactly one of the Config* fields below must match this type.
      enum:
      - cors
      - jwt
      - extAuthz
      - extProc
      - rateLimit
      - headers
      type: string
      x-enum-varnames:
      - MiddlewareTypeCORS
      - MiddlewareTypeJWT
      - MiddlewareTypeExtAuthz
      - MiddlewareTypeExtProc
      - MiddlewareTypeRateLimit
      - MiddlewareTypeHeaders
    model.OutlierDetectionOptions:
      description: |-
        OutlierDetection automatically ejects endpoints that return consecutive
        errors, without requiring active health checks.
        Maps to Cluster.outlier_detection.
      properties:
        baseEjectionTime:
          description: |-
            BaseEjectionTime is how long an endpoint stays ejected the first time.
            Each subsequent ejection multiplies this value by the ejection count.
            Accepts Go duration strings. Default: "30s".
            Maps to base_ejection_time.
          type: string
        consecutive5xx:
          description: |-
            Consecutive5xx is the number of consecutive 5xx responses that trigger
            ejection. Default: 5. Maps to consecutive_5xx.
          type: integer
        consecutiveGatewayErrors:
          description: |-
            ConsecutiveGatewayErrors is the number of consecutive gateway errors
            (502, 503, 504) that trigger ejection.
            Maps to consecutive_gateway_failure.
          type: integer
        interval:
          description: |-
            Interval is how often Envoy evaluates ejection conditions.
            Accepts Go duration strings. Default: "10s".
            Maps to interval.
          type: string
        maxEjectionPercent:
          description: |-
            MaxEjectionPercent is the maximum percentage of endpoints that can be
            ejected simultaneously. Default: 10.
            Maps to max_ejection_percent.
          type: integer
      type: object
    model.QueryParamMatcher:
      properties:
        name:
          description: Name is the query parameter name.
          type: string
        regex:
          description: Regex indicates that Value should be treated as a regular expression.
          type: boolean
        value:
          description: Value is the exact value the parameter must have.
          type: string
      type: object
    model.RateLimitConfig:
      description: |-
        RateLimit holds the rate limit filter configuration.
        Set when Type == "rateLimit".
      properties:
        destinationId:
          description: |-
            DestinationID references the Destination entity that hosts the gRPC
            rate limit service.
          type: string
        domain:
          description: |-
            Domain is the rate limit domain passed to the rate limit service.
            The service uses this to scope rate limit descriptors.
          type: string
        failureModeDeny:
          description: |-
            FailureModeDeny controls what happens when the rate limit service is
            unreachable. If true, requests are denied (fail-closed).
            Default is false (fail-open).
          type: boolean
        timeout:
          description: Timeout is the rate limit request deadline (e.g. "500ms").
          type: string
      type: object
    model.RateLimitDescriptor:
      properties:
        key:
          description: Key is the descriptor key (e.g. "remote_address", "header_match").
          type: string
        value:
          description: |-
            Value is the descriptor value. When empty, Envoy uses the request
            attribute as the value (e.g. the actual header value).
          type: string
      type: object
    model.RetryBackoff:
      description: Backoff controls the delay between retry attempts.
      properties:
        base:
          description: |-
            Base is the initial delay before the first retry.
            Accepts Go duration strings (e.g. "100ms").
          type: string
        max:
          description: |-
            Max is the upper bound on the backoff delay.
            Accepts Go duration strings (e.g. "1s").
          type: string
      type: object
    model.RetryCondition:
      enum:
      - server-error
      - connection-failure
      - gateway-error
      - retriable-codes
      type: string
      x-enum-varnames:
      - RetryOnServerError
      - RetryOnConnectionFailure
      - RetryOnGatewayError
      - RetryOnRetriableCodes
    model.RewriteRegex:
      description: PathRegex rewrites the path using a regular expression substitution.
      properties:
        pattern:
          description: Pattern is the RE2 regular expression matched against the request
            path.
          type: string
        substitution:
          description: |-
            Substitution is the replacement string. Capture groups from Pattern
            can be referenced as \1, \2, etc.
          type: string
      type: object
    model.RingSizeOptions:
      description: |-
        RingSize tunes the consistent hash ring used by RING_HASH.
        Ignored unless Algorithm is RING_HASH.
        Maps to Cluster.ring_hash_lb_config.
      properties:
        max:
          description: |-
            Max is the maximum number of virtual nodes in the ring.
            Default: 8388608. Maps to maximum_ring_size.
          type: integer
        min:
          description: |-
            Min is the minimum number of virtual nodes in the ring.
            Default: 1024. Maps to minimum_ring_size.
          type: integer
      type: object
    model.Route:
      properties:
        directResponse:
          $ref: '#/components/schemas/model.RouteDirectResponse'
        forward:
          $ref: '#/components/schemas/model.ForwardAction'
        id:
          description: ID is the unique identifier of the route.
          type: string
        match:
          $ref: '#/components/schemas/model.MatchRule'
        middlewareIds:
          description: |-
            MiddlewareIDs lists the IDs of Middleware entities active on this route.
            The builder registers these in the Envoy HCM pipeline and enables them
            only for this route (other routes where the middleware is not listed
            get it disabled via per_filter_config).
          items:
            type: string
          type: array
          uniqueItems: false
        middlewareOverrides:
          additionalProperties:
            $ref: '#/components/schemas/model.MiddlewareOverride'
          description: |-
            MiddlewareOverrides carries per-route overrides for active middlewares.
            The map key is the Middleware ID. When both the route's group and the
            route itself carry an override for the same middleware, the route
            override wins entirely (more specific takes precedence).
          type: object
        name:
          description: Name is a human-readable label for the route.
          type: string
        redirect:
          $ref: '#/components/schemas/model.RouteRedirect'
      type: object
    model.RouteDirectResponse:
      description: |-
        DirectResponse instructs Envoy to return a fixed HTTP response without
        contacting any upstream. Useful for health-check endpoints, maintenance
        pages, or returning a static 404.
        Mutually exclusive with Forward and Redirect.
      properties:
        body:
          description: Body is the response body returned to the client. Optional.
          type: string
        status:
          description: Status is the HTTP status code to return. Required.
          type: integer
      type: object
    model.RouteGroup:
      properties:
        headers:
          description: Headers are appended to each referenced route's own header
            matchers.
          items:
            $ref: '#/components/schemas/model.HeaderMatcher'
          type: array
          uniqueItems: false
        hostnames:
          description: |-
            Hostnames are merged (union) with each referenced route's own hostnames.
            An empty slice means only the route's own hostnames apply.
          items:
            type: string
          type: array
          uniqueItems: false
        id:
          description: ID is the unique identifier of the group.
          type: string
        includeAttemptCount:
          description: |-
            IncludeAttemptCount makes Envoy add the x-envoy-attempt-count header
            to upstream requests, indicating how many times the request has been
            attempted (including the original). Maps to
            VirtualHost.include_request_attempt_count.
          type: boolean
        middlewareIds:
          description: |-
            MiddlewareIDs lists the IDs of Middleware entities active on all routes
            in this group. The builder registers these in the Envoy HCM pipeline
            and enables them for every route in the group.
          items:
            type: string
          type: array
          uniqueItems: false
        middlewareOverrides:
          additionalProperties:
            $ref: '#/components/schemas/model.MiddlewareOverride'
          description: |-
            MiddlewareOverrides carries per-group overrides for active middlewares.
            The map key is the Middleware ID. These overrides apply to all routes
            in the group. If a route also carries an override for the same
            middleware, the route override wins entirely.
          type: object
        name:
          description: Name is a human-readable label for the group.
          type: string
        pathPrefix:
          description: |-
            PathPrefix is prepended literally to the path/pathPrefix/pathRegex of
            every referenced route. Mutually exclusive with PathRegex.
          type: string
        pathRegex:
          description: |-
            PathRegex is a RE2 regular expression that defines the group's path
            namespace. It is composed with the route's own path specifier according
            to the rules described above. Mutually exclusive with PathPrefix.
          type: string
        retryDefault:
          $ref: '#/components/schemas/model.RouteRetry'
        routeIds:
          description: |-
            RouteIDs lists the IDs of the routes that belong to this group.
            Routes are independent entities and may be referenced by multiple groups.
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    model.RouteMirror:
      description: |-
        Mirror sends a copy of the traffic to an additional Destination for
        observability or testing. The mirrored request is fire-and-forget;
        its response is discarded and never affects the client.
      properties:
        destinationId:
          description: |-
            DestinationID is the ID of the Destination that receives the
            mirrored traffic.
          type: string
        percentage:
          description: |-
            Percentage is the fraction of requests to mirror, from 0 to 100.
            Default: 100 (mirror all matched traffic).
          type: integer
      type: object
    model.RouteRedirect:
      description: |-
        Redirect instructs Envoy to return an HTTP redirect to the client
        instead of forwarding to an upstream.
        Mutually exclusive with Forward and DirectResponse.
      properties:
        code:
          description: |-
            Code is the HTTP status code returned to the client.
            Accepted values: 301, 302, 303, 307, 308. Default: 301.
          type: integer
        host:
          description: Host overrides only the hostname in the redirect target.
          type: string
        path:
          description: Path replaces the path component of the redirect target.
          type: string
        scheme:
          description: Scheme overrides only the scheme (e.g. "http" → "https").
          type: string
        stripQuery:
          description: StripQuery removes the query string from the redirect target.
          type: boolean
        url:
          description: |-
            URL is the complete target URL. When set, Scheme, Host, Path, and
            StripQuery are ignored — the client is sent directly to this URL.
          type: string
      type: object
    model.RouteRetry:
      description: Retry controls automatic retry behaviour when the upstream fails.
      properties:
        attempts:
          description: |-
            Attempts is the maximum number of times the request is retried.
            The original request does not count — setting 3 means up to 3 retries
            after the first failure (4 total attempts).
          type: integer
        backoff:
          $ref: '#/components/schemas/model.RetryBackoff'
        "on":
          description: |-
            On lists the conditions that trigger a retry. When empty, defaults
            to ["server-error", "connection-failure"].
          items:
            $ref: '#/components/schemas/model.RetryCondition'
          type: array
          uniqueItems: false
        perAttemptTimeout:
          description: |-
            PerAttemptTimeout is the deadline for each individual attempt.
            Accepts Go duration strings (e.g. "5s").
          type: string
        retriableCodes:
          description: |-
            RetriableCodes is the explicit list of HTTP status codes that trigger
            a retry. Only evaluated when On contains "retriable-codes".
          items:
            type: integer
          type: array
          uniqueItems: false
      type: object
    model.RouteRewrite:
      description: Rewrite transforms the URL before sending the request upstream.
      properties:
        autoHost:
          description: |-
            AutoHost sets the Host header to the hostname of the upstream
            Destination automatically. Useful when the backend requires its own
            hostname (e.g. an external SaaS API).
          type: boolean
        host:
          description: Host overrides the Host header sent to the upstream with a
            fixed value.
          type: string
        hostFromHeader:
          description: |-
            HostFromHeader takes the value of the named request header and uses it
            as the Host header sent to the upstream.
          type: string
        path:
          description: |-
            Path replaces the matched path prefix with the given value.
            For example, if the route matches "/api/v1" and Path is "/internal",
            a request to "/api/v1/users" arrives at the backend as "/internal/users".
          type: string
        pathRegex:
          $ref: '#/components/schemas/model.RewriteRegex'
      type: object
    model.RouteTimeouts:
      description: Timeouts controls how long the request is allowed to take.
      properties:
        idle:
          description: |-
            Idle is the maximum time a connection may remain open with no data
            flowing. Accepts Go duration strings. Useful for long-lived streaming
            connections that may stall.
          type: string
        request:
          description: |-
            Request is the total time the entire request may take from the moment
            Envoy receives the first byte from the client until the response is
            fully sent. Accepts Go duration strings (e.g. "30s", "1m").
          type: string
      type: object
    model.SlowStartOptions:
      description: |-
        SlowStart configures gradual traffic ramp-up to new endpoints.
        Helps avoid overwhelming a freshly-started pod with full traffic.
        Maps to Cluster.slow_start_config.
      properties:
        aggression:
          description: |-
            Aggression controls how aggressively weight ramps up. Values > 1.0
            produce a steeper ramp at the end; values < 1.0 ramp steeply at the
            start. Default: 1.0 (linear). Maps to aggression.
          type: number
        window:
          description: |-
            Window is how long the slow-start period lasts after an endpoint
            becomes healthy. Accepts Go duration strings (e.g. "30s", "2m").
            Maps to slow_start_window.
          type: string
      type: object
    model.TLSMode:
      description: |-
        Mode selects the connection security model.
        Default: none (plaintext).
      enum:
      - none
      - tls
      - mtls
      type: string
      x-enum-comments:
        TLSModeMTLS: mutual TLS — present client certificate
        TLSModeNone: plaintext (default)
        TLSModeTLS: TLS — verify server certificate
      x-enum-varnames:
      - TLSModeNone
      - TLSModeTLS
      - TLSModeMTLS
    model.TLSOptions:
      description: |-
        TLS controls upstream TLS / mTLS configuration.
        Maps to Cluster.transport_socket (envoy.transport_sockets.tls).
      properties:
        caFile:
          description: |-
            CAFile is the path to the CA certificate PEM file used to verify
            the server certificate. Applies to both tls and mtls modes.
            Maps to common_tls_context.validation_context.trusted_ca.filename.
          type: string
        certFile:
          description: |-
            CertFile is the path to the client certificate PEM file.
            Required when Mode is mtls.
            Maps to common_tls_context.tls_certificates[0].certificate_chain.filename.
          type: string
        keyFile:
          description: |-
            KeyFile is the path to the client private key PEM file.
            Required when Mode is mtls.
            Maps to common_tls_context.tls_certificates[0].private_key.filename.
          type: string
        maxVersion:
          description: |-
            MaxVersion is the maximum TLS protocol version Envoy will negotiate.
            Accepted values: same as MinVersion.
            Maps to common_tls_context.tls_params.tls_maximum_protocol_version.
          type: string
        minVersion:
          description: |-
            MinVersion is the minimum TLS protocol version Envoy will negotiate.
            Accepted values: "TLSv1_0", "TLSv1_1", "TLSv1_2", "TLSv1_3".
            Maps to common_tls_context.tls_params.tls_minimum_protocol_version.
          type: string
        mode:
          $ref: '#/components/schemas/model.TLSMode'
        sni:
          description: |-
            SNI overrides the Server Name Indication sent during the TLS handshake.
            When empty, Envoy uses the upstream host value.
            Maps to UpstreamTlsContext.sni.
          type: string
      type: object
    respond.ErrorBody:
      properties:
        error:
          description: Error contains a human-readable description of what went wrong.
          example: group "abc" not found
          type: string
      type: object
externalDocs:
  description: ""
  url: ""
info:
  contact:
    name: Rutoso project
    url: https://github.com/achetronic/rutoso
  description: |-
    REST API control plane for Envoy proxies. Manage route groups and routes;
    changes are pushed to all connected Envoy instances via xDS in real time.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Rutoso API
  version: "1.0"
openapi: 3.1.0
paths:
  /debug/xds/snapshot:
    get:
      description: Returns the last xDS snapshot pushed by Rutoso, serialised with
        protojson.
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                type: object
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Get xDS snapshot
      tags:
      - debug
  /destinations:
    get:
      description: Returns the full list of destinations.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/model.Destination'
                type: array
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: List destinations
      tags:
      - destinations
    post:
      description: Creates a new upstream destination entity.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.Destination'
                description: Destination definition
                summary: destination
        description: Destination definition
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.Destination'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Create a destination
      tags:
      - destinations
  /destinations/{destinationId}:
    delete:
      description: Deletes the destination with the given ID.
      parameters:
      - description: Destination ID
        in: path
        name: destinationId
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Delete a destination
      tags:
      - destinations
    get:
      description: Returns the destination with the given ID.
      parameters:
      - description: Destination ID
        in: path
        name: destinationId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.Destination'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Get a destination
      tags:
      - destinations
    put:
      description: Replaces the destination with the given ID.
      parameters:
      - description: Destination ID
        in: path
        name: destinationId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.Destination'
                description: Updated destination definition
                summary: destination
        description: Updated destination definition
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.Destination'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Update a destination
      tags:
      - destinations
  /groups:
    get:
      description: Returns the full list of route groups.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/model.RouteGroup'
                type: array
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: List groups
      tags:
      - groups
    post:
      description: Creates a new group referencing existing routes by ID.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.RouteGroup'
                description: Group definition
                summary: group
        description: Group definition
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.RouteGroup'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Create a group
      tags:
      - groups
  /groups/{groupId}:
    delete:
      description: Deletes the group with the given ID.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Delete a group
      tags:
      - groups
    get:
      description: Returns the group with the given ID.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.RouteGroup'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Get a group
      tags:
      - groups
    put:
      description: Replaces the group with the given ID.
      parameters:
      - description: Group ID
        in: path
        name: groupId
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.RouteGroup'
                description: Updated group definition
                summary: group
        description: Updated group definition
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.RouteGroup'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: Update a group
      tags:
      - groups
  /listeners:
    get:
      description: Returns the full list of listeners.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/model.Listener'
                type: array
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/respond.ErrorBody'
          description: Internal Server Error
      summary: List listeners
      tags:
      - listeners
    post:
      description: Creates a new Envoy listener entity.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.Listener'
                description: Listener definition
                summary: listener
        description: Listener definition
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/model.Listener'
          description: Created
        "400":
          content:
            application/json:
              schema:
