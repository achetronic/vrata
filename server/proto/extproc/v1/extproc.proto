// Vrata External Processor Protocol v1
//
// This protocol defines the contract between Vrata and an external
// processor service. The processor receives HTTP request and response
// phases (headers, body) and can inspect, mutate, or reject them.
//
// Processors can be implemented in any language that supports gRPC or
// plain HTTP. See the Vrata documentation for implementation guides.
//
// Two transport modes are supported:
//   - gRPC: bidirectional stream via the Processor service below.
//   - HTTP: one POST request per phase to the processor endpoint,
//     with JSON-encoded ProcessingRequest/ProcessingResponse bodies.
//     Both modes have full feature parity.

syntax = "proto3";

package extproc.v1;

option go_package = "github.com/achetronic/vrata/proto/extproc/v1;extprocv1";

// Processor is the gRPC service that external processors implement.
// Vrata opens one bidirectional stream per HTTP transaction. Each
// stream carries the configured phases (request headers, request body,
// response headers, response body) as sequential messages.
service Processor {
  rpc Process(stream ProcessingRequest) returns (stream ProcessingResponse);
}

// ─────────────────────────────────────────────────────────────────────
// Vrata → Processor
// ─────────────────────────────────────────────────────────────────────

// ProcessingRequest is sent by Vrata to the processor for each
// configured phase of an HTTP transaction.
message ProcessingRequest {
  oneof phase {
    // Request headers, sent before the request reaches the upstream.
    HttpHeaders request_headers = 1;

    // Response headers, sent after the upstream replies.
    HttpHeaders response_headers = 2;

    // A chunk of the request body (or the full body in buffered mode).
    HttpBody request_body = 3;

    // A chunk of the response body (or the full body in buffered mode).
    HttpBody response_body = 4;
  }

  // When true, Vrata is in observe-only mode: the processor receives
  // data but must NOT respond. Any responses are silently ignored.
  bool observe_only = 5;
}

// HttpHeaders carries the headers for a request or response phase.
message HttpHeaders {
  // All headers as ordered key-value pairs. Duplicate keys are
  // preserved (e.g. multiple Set-Cookie headers).
  repeated HeaderPair headers = 1;

  // True when no body follows this headers message.
  bool end_of_stream = 2;
}

// HttpBody carries a chunk (or the entirety) of a request or response body.
message HttpBody {
  // The body bytes.
  bytes body = 1;

  // True when this is the last body chunk.
  bool end_of_stream = 2;
}

// HeaderPair is a single HTTP header key-value pair.
message HeaderPair {
  string key = 1;
  string value = 2;
}

// ─────────────────────────────────────────────────────────────────────
// Processor → Vrata
// ─────────────────────────────────────────────────────────────────────

// ProcessingResponse is sent by the processor back to Vrata after
// inspecting a phase. It tells Vrata what to do: continue (with
// optional mutations), replace the body, or reject the request.
message ProcessingResponse {
  oneof action {
    // Respond to a request_headers phase.
    HeadersAction request_headers = 1;

    // Respond to a response_headers phase.
    HeadersAction response_headers = 2;

    // Respond to a request_body phase.
    BodyAction request_body = 3;

    // Respond to a response_body phase.
    BodyAction response_body = 4;

    // Reject the request immediately with a fixed response to the client.
    // Can be sent in response to any phase.
    RejectRequest reject = 5;
  }
}

// HeadersAction tells Vrata how to proceed after a headers phase.
message HeadersAction {
  // How to continue processing.
  ActionStatus status = 1;

  // Headers to add or replace on the request/response.
  repeated HeaderPair set_headers = 2;

  // Header names to remove from the request/response.
  repeated string remove_headers = 3;

  // When status is CONTINUE_AND_REPLACE, this replaces the entire body.
  // Ignored when status is CONTINUE.
  bytes replace_body = 4;
}

// BodyAction tells Vrata how to proceed after a body phase.
message BodyAction {
  // How to continue processing.
  ActionStatus status = 1;

  // Headers to add or replace. Only effective in buffered body mode.
  repeated HeaderPair set_headers = 2;

  // Header names to remove. Only effective in buffered body mode.
  repeated string remove_headers = 3;

  // Body mutation — replace or clear the body.
  oneof body_mutation {
    // Replace the body with these bytes.
    bytes replace_body = 4;

    // Clear the body entirely when set to true.
    bool clear_body = 5;
  }
}

// RejectRequest tells Vrata to stop processing and return a fixed
// response to the client. The request never reaches the upstream.
message RejectRequest {
  // HTTP status code to return (e.g. 403, 429).
  uint32 status = 1;

  // Response headers to include.
  repeated HeaderPair headers = 2;

  // Response body (if any).
  bytes body = 3;
}

// ActionStatus controls how Vrata proceeds after applying mutations.
enum ActionStatus {
  // Apply mutations and continue normal processing through remaining phases.
  CONTINUE = 0;

  // Apply mutations and skip remaining phases for this direction.
  // When sent from a headers phase, replace_body in HeadersAction
  // replaces the original body entirely.
  CONTINUE_AND_REPLACE = 1;
}
