# Values for TLS e2e tests: existingSecret mode.
# The test creates the k8s Secret before helm install.
image:
  repository: vrata
  tag: e2e-tls
  pullPolicy: Never

tls:
  enabled: true
  existingSecret: "vrata-e2e-tls"

auth:
  apiKeys:
    - name: proxy-fleet
      key: "e2e-proxy-key"
    - name: controller
      key: "e2e-controller-key"
    - name: operator
      key: "e2e-operator-key"

controlPlane:
  enabled: true
  replicas: 1
  persistence:
    enabled: false
  service:
    type: NodePort
    port: 8080
    nodePort: 31082
  config:
    controlPlane:
      address: ":8080"
      storePath: "/data"
      tls:
        cert: "${VRATA_TLS_CERT}"
        key: "${VRATA_TLS_KEY}"
        ca: "${VRATA_TLS_CA}"
        clientAuth: "optional"
      auth:
        apiKeys:
          - name: "proxy-fleet"
            key: "e2e-proxy-key"
          - name: "controller"
            key: "e2e-controller-key"
          - name: "operator"
            key: "e2e-operator-key"
    log:
      format: json
      level: debug

proxy:
  enabled: true
  replicas: 1
  service:
    type: ClusterIP
    port: 3000
  config:
    proxy:
      reconnectInterval: "2s"
      tls:
        cert: "${VRATA_TLS_CERT}"
        key: "${VRATA_TLS_KEY}"
        ca: "${VRATA_TLS_CA}"
      apiKey: "${VRATA_API_KEY}"
    log:
      format: json
      level: debug
