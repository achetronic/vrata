{{- if .Values.controller.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vrata.fullname" . }}-controller
  labels:
    {{- include "vrata.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vrata.name" . }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vrata.name" . }}
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controller.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "vrata.fullname" . }}-controller
      terminationGracePeriodSeconds: {{ .Values.controller.terminationGracePeriodSeconds }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ include "vrata.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/controller"]
          args:
            - --config=/config/config.yaml
          ports:
            - containerPort: 8081
              name: health
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
          env:
            {{- if .Values.tls.enabled }}
            - name: VRATA_TLS_CERT
              value: /tls/tls.crt
            - name: VRATA_TLS_KEY
              value: /tls/tls.key
            - name: VRATA_TLS_CA
              value: /tls/ca.crt
            {{- end }}
            {{- if .Values.auth.apiKeys }}
            - name: VRATA_API_KEY
              value: {{ (index .Values.auth.apiKeys 0).key | quote }}
            {{- end }}
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vrata.fullname" . }}-controller
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "vrata.tlsControllerSecretName" . }}
        {{- end }}
{{- end }}
