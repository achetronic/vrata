{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "vrata.cpName" . }}
  labels:
    {{- include "vrata.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "vrata.cpName" . }}-headless
  replicas: {{ .Values.controlPlane.replicas }}
  {{- if include "vrata.raftEnabled" . }}
  podManagementPolicy: Parallel
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vrata.name" . }}
      app.kubernetes.io/component: controlplane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vrata.name" . }}
        app.kubernetes.io/component: controlplane
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- with .Values.controlPlane.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.controlPlane.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.controlPlane.terminationGracePeriodSeconds }}
      {{- with .Values.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vrata
          image: "{{ .Values.image.repository }}:{{ include "vrata.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/config/config.yaml
          ports:
            - containerPort: {{ .Values.controlPlane.service.port }}
              name: http
            {{- if include "vrata.raftEnabled" . }}
            - containerPort: {{ include "vrata.raftPort" . }}
              name: raft
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- if .Values.tls.enabled }}
            - name: VRATA_TLS_CERT
              value: /tls/tls.crt
            - name: VRATA_TLS_KEY
              value: /tls/tls.key
            - name: VRATA_TLS_CA
              value: /tls/ca.crt
            {{- end }}
            {{- with .Values.controlPlane.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- with .Values.controlPlane.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.controlPlane.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vrata.cpName" . }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "vrata.tlsServerSecretName" . }}
        {{- end }}
        {{- if not .Values.controlPlane.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- with .Values.controlPlane.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.controlPlane.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ toYaml .Values.controlPlane.persistence.accessModes | nindent 10 }}
        {{- if .Values.controlPlane.persistence.storageClass }}
        storageClassName: {{ .Values.controlPlane.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.controlPlane.persistence.size }}
  {{- end }}
{{- end }}
